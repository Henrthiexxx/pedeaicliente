<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <script>(function(){var t=localStorage.getItem("theme")||"dark";document.documentElement.setAttribute("data-theme",t);})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada - Pedrad</title>
    <meta name="theme-color" content="#000000">
    <style>
        :root,[data-theme="dark"]{--bg:#09090b;--bg-card:#0f0f12;--bg-input:#18181b;--text:#fafafa;--text-muted:#71717a;--border:#27272a;--primary:#fff;--accent:#a78bfa;--danger:#f87171;--success:#4ade80;--warning:#fbbf24;--radius:12px;}[data-theme="light"]{--bg:#f4f4f5;--bg-card:#fff;--bg-input:#f0f0f2;--text:#18181b;--text-muted:#a1a1aa;--border:#e4e4e7;--primary:#18181b;--accent:#7c3aed;--danger:#dc2626;--success:#16a34a;--warning:#d97706;}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 24px;
            opacity: 0.5;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        p {
            color: var(--muted);
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255,255,255,0.1);
        }
        .links {
            margin-top: 24px;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .links a:hover { color: var(--text); }
    </style>
    <script>function esc(s){if(typeof s!="string")return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML;}</script>
</head>
<body>
    <div class="container">
        <div class="icon">🔍</div>
        <h1>PÁGINA NÃO ENCONTRADA</h1>
        <p>A página que você procura não existe ou foi movida. Verifique o endereço ou volte para a página inicial.</p>
        <a href="index.html" class="btn">VOLTAR AO INÍCIO</a>
        <div class="links">
            <a href="javascript:history.back()">← Voltar</a>
            <a href="index.html">Início</a>
        </div>
    </div>
    <script>
        // Auto-redirect se veio de erro
        const params = new URLSearchParams(window.location.search);
        if (params.get('auto') === '1') {
            setTimeout(() => window.location.href = 'index.html', 3000);
        }
    </script>
</body>
</html>
