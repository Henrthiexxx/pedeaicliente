<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Destaques — Pedra Delivery</title>
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<script>(function(){var t=localStorage.getItem('pedrad-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="client.css">
<script src="page-transition.js" defer></script>
<style>
@keyframes appIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
body {
  animation: appIn .3s ease both;
  background:
    radial-gradient(ellipse 110% 32% at 50% 0%, #0d2018 0%, transparent 68%),
    #080808;
  min-height: 100dvh;
}

/* Header */
.page-hdr {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 16px 14px;
  background: rgba(8,8,8,.92);
  backdrop-filter: blur(18px) saturate(150%);
  -webkit-backdrop-filter: blur(18px) saturate(150%);
  border-bottom: 1px solid rgba(255,255,255,.04);
}

.back-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: #111116;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #8888a0;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .15s, color .15s;
}
.back-btn:hover { background: #1c1c24; color: #f0f0f2; }
.back-btn svg { width: 18px; height: 18px; }

.page-hdr-title {
  font-size: .96rem;
  font-weight: 700;
  color: #d8d8e0;
  letter-spacing: -.02em;
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 32px 120px;
  text-align: center;
  gap: 12px;
}

.empty-icon {
  width: 64px;
  height: 64px;
  border-radius: 20px;
  background: rgba(34,197,94,.08);
  border: 1px solid rgba(34,197,94,.16);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 6px;
}

.empty-icon svg {
  width: 28px;
  height: 28px;
  stroke: rgba(34,197,94,.6);
}

.empty-title {
  font-size: .96rem;
  font-weight: 700;
  color: #3a3a46;
  letter-spacing: -.02em;
}

.empty-sub {
  font-size: .78rem;
  color: #282830;
  line-height: 1.5;
}

/* Nav */
.client-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 64px;
  background: rgba(8,8,8,.96);
  backdrop-filter: blur(18px) saturate(150%);
  -webkit-backdrop-filter: blur(18px) saturate(150%);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 100;
  border-top: 1px solid #111116;
  padding-bottom: env(safe-area-inset-bottom);
}

.cnav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: #38383e;
  font-size: .55rem;
  cursor: pointer;
  padding: 6px 20px;
  transition: color .18s;
  text-transform: uppercase;
  letter-spacing: .06em;
  font-weight: 600;
  text-decoration: none;
}
.cnav-item:hover { color: #666678; }
.cnav-item.active { color: #22c55e !important; }
.cnav-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.cnav-icon svg { width: 20px; height: 20px; }
</style>
</head>
<body>

<div class="page-hdr">
  <button class="back-btn" onclick="history.back()" aria-label="Voltar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <span class="page-hdr-title">Destaques</span>
</div>

<div class="empty-state">
  <div class="empty-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
  </div>
  <div class="empty-title">Em breve</div>
  <div class="empty-sub">Os destaques da sua região<br>aparecerão aqui em breve.</div>
</div>

<nav class="client-nav">
  <a class="cnav-item" href="home.html">
    <span class="cnav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </span>
    Início
  </a>
  <a class="cnav-item" href="orders.html">
    <span class="cnav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="2"/>
        <line x1="9" y1="12" x2="15" y2="12"/>
        <line x1="9" y1="16" x2="13" y2="16"/>
      </svg>
    </span>
    Pedidos
  </a>
  <a class="cnav-item" href="profile.html">
    <span class="cnav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </span>
    Perfil
  </a>
</nav>

</body>
</html>
