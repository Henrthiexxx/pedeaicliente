<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Meus Pedidos — Pedrad</title>
<meta name="theme-color" content="#09090b">
<script>(function(){var t=localStorage.getItem('pedrad-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="client.css">
<style>
.orders-page{padding-bottom:80px;padding:68px 16px 40px;max-width:520px;margin:0 auto}
.orders-title{font-size:1rem;font-weight:700;margin-bottom:16px}
.order-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh-sm);transition:all .2s}
.order-card:hover{box-shadow:var(--sh-md)}
.order-card.active-order{border-color:var(--store-accent,#22c55e)}
.oc-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:10px}
.oc-header:hover{background:var(--bg-hover)}
.oc-store{font-size:.88rem;font-weight:600}
.oc-id{font-size:.7rem;color:var(--text-2);margin-top:2px}
.oc-right{text-align:right}
.oc-total{font-size:.88rem;font-weight:700}
.oc-status{font-size:.66rem;font-weight:600;padding:3px 8px;border-radius:12px;margin-top:4px;display:inline-block}
.oc-status.s-pending{background:rgba(251,191,36,.1);color:var(--orange)}
.oc-status.s-confirmed,.oc-status.s-preparing{background:rgba(96,165,250,.1);color:var(--info,#60a5fa)}
.oc-status.s-ready{background:rgba(52,211,153,.1);color:var(--green)}
.oc-status.s-delivering{background:rgba(52,211,153,.1);color:var(--green)}
.oc-status.s-delivered{background:rgba(52,211,153,.06);color:var(--text-2)}
.oc-status.s-cancelled{background:rgba(248,113,113,.1);color:var(--red)}
.oc-body{max-height:0;overflow:hidden;transition:max-height .3s}
.oc-body.open{max-height:600px}
.oc-body-inner{padding:0 16px 16px}
.oc-section{margin-top:12px}
.oc-section-label{font-size:.66rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.oc-item{display:flex;gap:6px;font-size:.82rem;padding:4px 0}
.oc-item-qty{color:var(--text-2);min-width:24px;font-weight:600}
.oc-item-name{flex:1}
.oc-item-price{color:var(--text-2);font-variant-numeric:tabular-nums}
/* Timeline */
.oc-timeline{display:flex;flex-direction:column;gap:0}
.oc-tl-item{display:flex;gap:10px;position:relative;padding-bottom:12px}
.oc-tl-item:last-child{padding-bottom:0}
.oc-tl-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;margin-top:3px;z-index:1}
.oc-tl-item.done .oc-tl-dot{background:var(--green)}
.oc-tl-item.current .oc-tl-dot{background:var(--store-accent,#22c55e);box-shadow:0 0 0 3px rgba(52,211,153,.2)}
.oc-tl-line{position:absolute;left:4px;top:13px;bottom:0;width:2px;background:var(--border)}
.oc-tl-item:last-child .oc-tl-line{display:none}
.oc-tl-text{font-size:.78rem;font-weight:500}
.oc-tl-time{font-size:.66rem;color:var(--text-2);margin-top:1px}
/* Driver tracking */
.oc-driver{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--rs);padding:12px;display:flex;gap:10px;align-items:center;margin-top:10px}
.oc-driver-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg-3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;overflow:hidden}
.oc-driver-avatar img{width:100%;height:100%;object-fit:cover}
.oc-driver-info{flex:1}.oc-driver-name{font-size:.82rem;font-weight:600}.oc-driver-vehicle{font-size:.7rem;color:var(--text-2);margin-top:1px}
.oc-driver-phone{font-size:.78rem;color:var(--info,#60a5fa);text-decoration:none;margin-top:2px;display:block}
.oc-empty{text-align:center;padding:60px 20px;color:var(--text-3)}.oc-empty-icon{font-size:2rem;opacity:.3;margin-bottom:8px}
.tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.tab{flex:1;padding:10px;text-align:center;font-size:.78rem;font-weight:500;cursor:pointer;background:var(--bg-2);color:var(--text-2);font-family:inherit;border:none;transition:all .15s}
.tab.active{background:var(--accent);color:var(--accent-t)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<header class="store-header">
    <button class="hdr-btn" onclick="location.href='home.html'">←</button>
    <span class="hdr-title">Meus Pedidos</span>
    <span></span>
</header>

<main class="orders-page">
    <div class="tabs">
        <button class="tab active" id="tabActive" onclick="setTab('active')">Em andamento</button>
        <button class="tab" id="tabPast" onclick="setTab('past')">Anteriores</button>
    </div>
    <div id="ordersList"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyAnIJRcUxN-0swpVnonPbJjTSK87o4CQ_g",authDomain:"pedrad-814d0.firebaseapp.com",projectId:"pedrad-814d0",storageBucket:"pedrad-814d0.appspot.com",messagingSenderId:"293587190550",appId:"1:293587190550:web:80c9399f82847c80e20637"};
if(!firebase.apps.length)firebase.initializeApp(FC);
const db=firebase.firestore(),auth=firebase.auth();

let orders=[],tab='active',unsub=null;
const ACTIVE=['pending','confirmed','preparing','ready','delivering'];
const LABELS={pending:'Pendente',confirmed:'Confirmado',preparing:'Preparando',ready:'Pronto',delivering:'A caminho',delivered:'Entregue',cancelled:'Cancelado'};

function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function money(v){return(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}

function setTab(t){
    tab=t;
    document.getElementById('tabActive').classList.toggle('active',t==='active');
    document.getElementById('tabPast').classList.toggle('active',t==='past');
    render();
}

function render(){
    const el=document.getElementById('ordersList');
    const filtered=tab==='active'
        ?orders.filter(o=>ACTIVE.includes(o.status))
        :orders.filter(o=>!ACTIVE.includes(o.status));

    if(!filtered.length){
        el.innerHTML=`<div class="oc-empty"><div class="oc-empty-icon">—</div>${tab==='active'?'Nenhum pedido em andamento':'Nenhum pedido anterior'}</div>`;
        return;
    }

    el.innerHTML=filtered.map(o=>renderCard(o)).join('');
}

function renderCard(o){
    const isActive=ACTIVE.includes(o.status);
    const date=o.createdAt?.toDate?.()||new Date(o.createdAt||0);
    const time=date.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const dateStr=date.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    const shortId=o.id.slice(-6).toUpperCase();

    const itemsHtml=(o.items||[]).map(i=>{
        const at=(i.addons||[]).reduce((s,a)=>s+(a.price||0),0);
        return`<div class="oc-item"><span class="oc-item-qty">${i.qty}×</span><span class="oc-item-name">${esc(i.name)}</span><span class="oc-item-price">${money((i.price+at)*i.qty)}</span></div>`;
    }).join('');

    // Timeline
    const steps=['pending','confirmed','preparing','ready',o.deliveryMode==='pickup'?'delivered':'delivering','delivered'];
    const uniqueSteps=[...new Set(steps)];
    const currentIdx=uniqueSteps.indexOf(o.status);
    const tlHtml=uniqueSteps.map((s,i)=>{
        const cls=i<currentIdx?'done':i===currentIdx?'current':'';
        const entry=(o.timeline||[]).find(t=>t.status===s);
        const t=entry?new Date(entry.timestamp).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
        return`<div class="oc-tl-item ${cls}"><div class="oc-tl-dot"></div><div class="oc-tl-line"></div><div><div class="oc-tl-text">${LABELS[s]||s}</div>${t?`<div class="oc-tl-time">${t}</div>`:''}</div></div>`;
    }).join('');

    // Driver info
    let driverHtml='';
    if(o.driver&&o.status==='delivering'){
        const d=o.driver;
        driverHtml=`<div class="oc-driver">
            <div class="oc-driver-avatar">${d.photoUrl?`<img src="${esc(d.photoUrl)}">`:(d.name||'E')[0]}</div>
            <div class="oc-driver-info">
                <div class="oc-driver-name">${esc(d.name||'Entregador')}</div>
                <div class="oc-driver-vehicle">${esc(d.vehicle||'')}</div>
                ${d.phone&&d.allowPhone?`<a href="tel:${d.phone}" class="oc-driver-phone">${esc(d.phone)}</a>`:''}
                ${d.phone&&d.allowWhatsapp?`<a href="https://wa.me/55${(d.phone||'').replace(/\D/g,'')}" class="oc-driver-phone" target="_blank">WhatsApp</a>`:''}
            </div>
        </div>`;
    }

    return`<div class="order-card ${isActive?'active-order':''}">
        <div class="oc-header" onclick="toggleCard('${o.id}')">
            <div>
                <div class="oc-store">${esc(o.storeName||'Pedido')}</div>
                <div class="oc-id">#${shortId} · ${dateStr} ${time} · ${o.deliveryMode==='pickup'?'Retirada':'Entrega'}</div>
            </div>
            <div class="oc-right">
                <div class="oc-total">${money(o.total)}</div>
                <span class="oc-status s-${o.status}">${LABELS[o.status]||o.status}</span>
            </div>
        </div>
        <div class="oc-body" id="ob-${o.id}" ${isActive&&orders.filter(x=>ACTIVE.includes(x.status)).length<=2?'class="open"':''}>
            <div class="oc-body-inner">
                <div class="oc-section"><div class="oc-section-label">Progresso</div>${tlHtml}</div>
                ${driverHtml}
                <div class="oc-section"><div class="oc-section-label">Itens</div>${itemsHtml}</div>
            </div>
        </div>
    </div>`;
}

function toggleCard(id){document.getElementById('ob-'+id)?.classList.toggle('open')}

// ══════════ REALTIME LISTENER ══════════
function listen(){
    const uid=auth.currentUser?.uid;
    if(!uid){document.getElementById('ordersList').innerHTML='<div class="oc-empty">Faça login para ver seus pedidos</div>';return}

    if(unsub)unsub();
    // Ouve apenas pedidos dos últimos 7 dias do usuário
    const weekAgo=new Date(Date.now()-7*86400000);
    unsub=db.collection('orders')
        .where('userId','==',uid)
        .where('createdAt','>=',weekAgo)
        .orderBy('createdAt','desc')
        .limit(30)
        .onSnapshot(snap=>{
            orders=snap.docs.map(d=>({id:d.id,...d.data()}));
            render();
        },err=>{console.error(err);toast('Erro ao carregar')});
}

auth.onAuthStateChanged(user=>{
    if(user)listen();
    else{document.getElementById('ordersList').innerHTML='<div class="oc-empty"><a href="index.html">Faça login</a></div>'}
});

window.addEventListener('beforeunload',()=>{if(unsub)unsub()});
</script>

<nav class="client-nav"><a class="cnav-item" href="home.html"><span class="cnav-icon">⌂</span>Início</a><a class="cnav-item active" href="orders.html"><span class="cnav-icon">≡</span>Pedidos</a></nav>
</body>
</html>
