<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<html lang="pt-BR">
<head>
  <script>
    (function () {
      var t = localStorage.getItem("pedrad-theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script><meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Informações da Loja</title>
  <meta name="theme-color" content="#09090b">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="index.css">
  <script src="pwa-register.js" defer></script>
  <style>
    :root,[data-theme="dark"] {
      --wall-opacity: .15;
      --wall-blend: luminosity;
      --glass-bg: rgba(9,9,11,.78);
      --glass-border: rgba(255,255,255,.08);
      --glass-blur: 20px;
      --card-glow: 0 8px 28px rgba(0,0,0,.22);
      --divider: rgba(255,255,255,.05);
      --hover-bg: rgba(255,255,255,.03);
    }
    [data-theme="light"] {
      --wall-opacity: .1;
      --wall-blend: multiply;
      --glass-bg: rgba(244,244,245,.78);
      --glass-border: rgba(0,0,0,.06);
      --glass-blur: 20px;
      --card-glow: 0 8px 28px rgba(0,0,0,.06);
      --divider: rgba(0,0,0,.05);
      --hover-bg: rgba(0,0,0,.025);
    }

    html, body { margin:0; padding:0; min-height:100vh; overflow-x:hidden; }
    body { background:var(--bg); }

    .wall { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .wall-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
      opacity: var(--wall-opacity); mix-blend-mode: var(--wall-blend); display:none; }
    .wall-img.show { display:block; }
    .wall-emoji { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:min(50vw, 22rem); opacity:.04; display:none; user-select:none; }
    .wall-emoji.show { display:block; }
    .wall-vignette { position:absolute; inset:0;
      background:radial-gradient(ellipse at center, transparent 40%, var(--bg) 100%); pointer-events:none; }

    .si-header {
      position:fixed; top:0; left:0; right:0;
      height:calc(56px + env(safe-area-inset-top));
      padding:env(safe-area-inset-top) 16px 0;
      background:var(--glass-bg);
      backdrop-filter:blur(var(--glass-blur));
      -webkit-backdrop-filter:blur(var(--glass-blur));
      border-bottom:1px solid var(--glass-border);
      display:flex; align-items:center; gap:12px;
      z-index:100;
    }
    .si-back {
      width:40px; height:40px; border-radius:10px;
      background:var(--bg-input); border:1px solid var(--border);
      color:var(--text); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all .18s;
    }
    .si-back:hover { border-color:var(--border-hover,var(--border)); box-shadow:0 1px 3px rgba(0,0,0,.3); transform:translateY(-1px); }
    .si-back:active { transform:scale(.95); }
    .si-back svg { width:18px; height:18px; }
    .si-title { font-size:.9rem; font-weight:500; letter-spacing:2px; text-transform:uppercase; }

    .si-content {
      position:relative; z-index:1;
      max-width:540px; margin:0 auto;
      padding:calc(72px + env(safe-area-inset-top)) 16px 40px;
    }

    .si-banner {
      background:var(--glass-bg);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid var(--glass-border);
      border-radius:16px; padding:28px 20px;
      margin-bottom:16px; text-align:center;
      box-shadow:var(--card-glow);
    }
    .si-store-name { font-size:1.35rem; font-weight:700; margin-bottom:4px; }
    .si-store-cat { color:var(--text-muted); font-size:.85rem; margin-bottom:14px; }
    .si-status-badge {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 12px; border-radius:20px;
      font-size:.74rem; font-weight:600;
      margin-bottom:14px;
    }
    .si-status-badge.open { background:rgba(34,197,94,.15); color:#22c55e; border:1px solid rgba(34,197,94,.3); }
    .si-status-badge.closed { background:rgba(239,68,68,.12); color:#ef4444; border:1px solid rgba(239,68,68,.25); }
    .si-status-badge .dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
    .si-rating { display:flex; flex-direction:column; align-items:center; gap:3px; }
    .si-rating-val { display:flex; align-items:center; gap:6px; font-size:1.2rem; font-weight:700; }
    .si-rating-val svg { width:20px; height:20px; color:var(--warning,#fbbf24); }
    .si-rating-count { font-size:.8rem; color:var(--text-muted); }

    .si-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:16px; padding:18px; margin-bottom:14px;
      box-shadow:var(--card-glow);
      transition:background .22s, border-color .22s;
    }
    .si-card-title {
      font-size:.95rem; font-weight:600; margin-bottom:14px;
      display:flex; align-items:center; gap:8px;
    }
    .si-card-title svg { width:18px; height:18px; color:var(--text-muted); flex-shrink:0; }

    .info-row {
      display:flex; align-items:center; gap:12px;
      padding:12px 0;
      border-bottom:1px solid var(--divider);
    }
    .info-row:last-child { border-bottom:none; }
    .info-icon {
      width:38px; height:38px; border-radius:10px;
      background:var(--bg-input); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .info-icon svg { width:18px; height:18px; color:var(--text-muted); }
    .info-body { flex:1; min-width:0; }
    .info-label { font-size:.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:2px; }
    .info-value { font-weight:500; font-size:.9rem; word-break:break-word; }
    .info-action {
      padding:8px 14px; border-radius:8px; border:none;
      background:var(--primary); color:var(--bg);
      font-size:.8rem; font-weight:600; cursor:pointer;
      flex-shrink:0; transition:all .18s;
      text-decoration:none; display:inline-flex; align-items:center; gap:4px;
    }
    .info-action:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.15); }

    /* ── Hours list ── */
    .hours-list { margin-top:4px; }
    .hours-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 0; border-bottom:1px solid var(--divider);
      font-size:.86rem;
    }
    .hours-row:last-child { border-bottom:none; }
    .hours-row.today { font-weight:600; }
    .hours-row.today .hours-day::before {
      content:'•'; color:var(--primary); margin-right:6px;
    }
    .hours-day { color:var(--text); }
    .hours-time { color:var(--text-muted); font-variant-numeric:tabular-nums; }
    .hours-row.closed-day .hours-time { color:#ef4444; opacity:.85; }

    .review-item { padding:14px 0; border-bottom:1px solid var(--divider); }
    .review-item:last-child { border-bottom:none; }
    .review-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .review-author { font-weight:600; font-size:.9rem; }
    .review-date { font-size:.72rem; color:var(--text-muted); }
    .review-stars { display:flex; gap:12px; margin-bottom:6px; flex-wrap:wrap; }
    .review-stars-item { display:flex; align-items:center; gap:4px; font-size:.8rem; color:var(--text-muted); }
    .review-stars-item .stars { color:var(--warning,#fbbf24); letter-spacing:1px; }
    .review-comment { color:var(--text-muted); font-size:.85rem; line-height:1.5; word-break:break-word; font-style:italic; }
    .review-report-btn { margin-top:10px; padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:.72rem; cursor:pointer; }
    .review-report-btn:hover { color:var(--danger,#f87171); border-color:var(--danger,#f87171); }
    .empty-reviews { text-align:center; padding:36px 16px; color:var(--text-muted); }
    .empty-reviews svg { width:40px; height:40px; color:var(--text-muted); opacity:.3; margin-bottom:10px; }

    .toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--glass-bg);
      backdrop-filter:blur(var(--glass-blur));
      -webkit-backdrop-filter:blur(var(--glass-blur));
      padding:12px 22px; border-radius:10px;
      border:1px solid var(--glass-border);
      box-shadow:0 8px 32px rgba(0,0,0,.3);
      z-index:300; opacity:0;
      font-size:.82rem; transition:all .3s;
    }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    @media(max-width:420px) {
      .si-content { padding-left:12px; padding-right:12px; }
      .info-icon { width:34px; height:34px; }
    }
  </style>
  <script>function esc(s){if(typeof s!="string")return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML;}</script>
</head>
<body>

  <div class="wall">
    <img class="wall-img" id="wallImg" alt="">
    <div class="wall-emoji" id="wallEmoji"></div>
    <div class="wall-vignette"></div>
  </div>

  <div class="modal" id="reportReviewModal">
    <div class="modal-sheet" style="max-width:420px">
      <div class="modal-handle" onclick="closeReportReviewModal()"></div>
      <div style="padding:18px">
        <h3 style="margin:0 0 8px;font-size:1rem">Denunciar avaliação</h3>
        <p style="margin:0 0 12px;color:var(--text-muted);font-size:.84rem;line-height:1.45">Explique rapidamente o motivo da denúncia. A equipe administrativa vai revisar.</p>
        <textarea id="reportReviewReason" class="input" rows="4" placeholder="Motivo da denúncia" style="width:100%;min-height:96px"></textarea>
        <button class="btn btn-accent btn-block" type="button" onclick="submitReviewReport()" style="margin-top:12px">Enviar denúncia</button>
      </div>
    </div>
  </div>

  <div class="si-header">
    <button class="si-back" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="si-title">Informações</div>
  </div>

  <div class="si-content">

    <div class="si-banner">
      <div class="si-store-name" id="storeName">Carregando...</div>
      <div class="si-store-cat" id="storeCat"></div>
      <div id="statusBadgeWrap"></div>
      <div class="si-rating">
        <div class="si-rating-val">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span id="ratingVal">-</span>
        </div>
        <div class="si-rating-count" id="reviewCount">0 avaliações</div>
      </div>
    </div>

    <div class="si-card" id="aboutSection">
      <div class="si-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Sobre
      </div>
      <p id="storeDesc" style="color:var(--text-muted);line-height:1.6;font-size:.9rem;margin:0;">-</p>
    </div>

    <div class="si-card">
      <div class="si-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        Contato
      </div>

      <div class="info-row" id="phoneRow" style="display:none">
        <div class="info-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        </div>
        <div class="info-body">
          <div class="info-label">Telefone</div>
          <div class="info-value" id="storePhone">-</div>
        </div>
        <button class="info-action" onclick="copyPhone()">Copiar</button>
      </div>

      <div class="info-row" id="addrRow" style="display:none">
        <div class="info-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="info-body">
          <div class="info-label">Endereço</div>
          <div class="info-value" id="storeAddr">-</div>
        </div>
      </div>

      <div class="info-row">
        <div class="info-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="8 12 12 16 16 12"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
        </div>
        <div class="info-body">
          <div class="info-label">Tempo de entrega</div>
          <div class="info-value" id="delivTime">-</div>
        </div>
      </div>

    </div>

    <!-- Horários (lista completa) -->
    <div class="si-card" id="hoursCard">
      <div class="si-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Horários
      </div>
      <div class="hours-list" id="hoursList"></div>
    </div>

    <div class="si-card">
      <div class="si-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Avaliações
      </div>
      <div id="reviewsList">
        <div class="empty-reviews">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <div>Carregando avaliações...</div>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey:"AIzaSyAnIJRcUxN-0swpVnonPbJjTSK87o4CQ_g",
      authDomain:"pedrad-814d0.firebaseapp.com",
      projectId:"pedrad-814d0",
      storageBucket:"pedrad-814d0.firebasestorage.app",
      messagingSenderId:"293587190550",
      appId:"1:293587190550:web:80c9399f82847c80e20637"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const storeId = new URLSearchParams(location.search).get('id');
    let storePhone = '';

    if (!storeId) { showToast('Loja não encontrada'); setTimeout(goBack, 1200); }

    // ===== HOURS HELPERS =====
    const DAY_KEYS  = ['sun','mon','tue','wed','thu','fri','sat'];
    const DAY_LIST  = [
      { key:'mon', label:'Segunda-feira' },
      { key:'tue', label:'Terça-feira' },
      { key:'wed', label:'Quarta-feira' },
      { key:'thu', label:'Quinta-feira' },
      { key:'fri', label:'Sexta-feira' },
      { key:'sat', label:'Sábado' },
      { key:'sun', label:'Domingo' },
      { key:'holidays', label:'Feriados' }
    ];

    function parseHM(s){const[h,m]=String(s||'00:00').split(':').map(Number);return(h||0)*60+(m||0)}

    // Converte legacy weekdayOpen/Close → novo formato
    function legacyHoursToNew(s){
      if(!s) return null;
      const wO=s.weekdayOpen, wC=s.weekdayClose, eO=s.weekendOpen, eC=s.weekendClose;
      if(!wO && !eO) return null;
      const wOpen = wO||'11:00', wClose = wC||'22:00';
      const eOpen = eO||'11:00', eClose = eC||'23:00';
      return {
        mon:{enabled:true,open:wOpen,close:wClose}, tue:{enabled:true,open:wOpen,close:wClose},
        wed:{enabled:true,open:wOpen,close:wClose}, thu:{enabled:true,open:wOpen,close:wClose},
        fri:{enabled:true,open:wOpen,close:wClose},
        sat:{enabled:true,open:eOpen,close:eClose}, sun:{enabled:true,open:eOpen,close:eClose},
        holidays:{enabled:false,open:'11:00',close:'22:00'}
      };
    }

    function getHours(store){
      return store?.settings?.hours || legacyHoursToNew(store?.settings) || null;
    }

    function isStoreOpen(store){
      if(store?.manuallyClosed === true) return false;
      const hours = getHours(store);
      if(!hours) return store?.open !== false;
      const now = new Date();
      const day = hours[DAY_KEYS[now.getDay()]];
      if(!day || day.enabled === false) return false;
      const cur = now.getHours()*60 + now.getMinutes();
      const open = parseHM(day.open), close = parseHM(day.close);
      if(open === close) return false;
      return close > open ? (cur>=open && cur<close) : (cur>=open || cur<close);
    }

    function renderHours(store){
      const hoursCard = document.getElementById('hoursCard');
      const hours = getHours(store);
      if(!hours){ hoursCard.style.display = 'none'; return; }

      const todayKey = DAY_KEYS[new Date().getDay()];
      const list = document.getElementById('hoursList');
      list.innerHTML = DAY_LIST.map(d => {
        const data = hours[d.key];
        const isToday = d.key === todayKey;
        const isClosed = !data || data.enabled === false;
        const time = isClosed ? 'Fechado' : `${data.open} – ${data.close}`;
        return `<div class="hours-row${isToday?' today':''}${isClosed?' closed-day':''}">
          <span class="hours-day">${d.label}</span>
          <span class="hours-time">${time}</span>
        </div>`;
      }).join('');
    }

    function renderStatusBadge(store){
      const wrap = document.getElementById('statusBadgeWrap');
      const open = isStoreOpen(store);
      wrap.innerHTML = `<div class="si-status-badge ${open?'open':'closed'}">
        <span class="dot"></span>${open?'Aberto agora':'Fechado agora'}
      </div>`;
    }

    function goBack() {
      if (document.referrer && document.referrer.includes(location.host)) history.back();
      else location.href = 'index.html';
    }
    function fmt(v) { return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0); }
    function fmtDate(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
    }
    function stars(n) { const f=Math.floor(n); return '★'.repeat(f)+'☆'.repeat(5-f); }
    function showToast(msg) {
      const t=document.getElementById('toast');
      t.textContent=msg; t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),3000);
    }

    function copyPhone() {
      if (!storePhone) return showToast('Telefone não disponível');
      const num = '55' + storePhone.replace(/\D/g,'');
      navigator.clipboard.writeText(num).then(
        ()=>showToast('Número copiado: '+num),
        ()=>showToast('Número: '+num)
      );
    }

    async function loadStoreInfo() {
      try {
        const doc = await db.collection('stores').doc(storeId).get();
        if (!doc.exists) { showToast('Loja não encontrada'); return setTimeout(goBack,1200); }
        const s = doc.data();

        const wallImg = document.getElementById('wallImg');
        const wallEmoji = document.getElementById('wallEmoji');
        if (s.imageData || s.imageUrl) {
          wallImg.src = s.imageData || s.imageUrl;
          wallImg.classList.add('show');
        } else {
          wallEmoji.textContent = s.emoji || '●';
          wallEmoji.classList.add('show');
        }

        document.getElementById('storeName').textContent = s.name || 'Loja';
        document.getElementById('storeCat').textContent = s.category || '';
        document.getElementById('ratingVal').textContent = (s.rating || 0).toFixed(1);
        const rc = s.reviewCount || 0;
        document.getElementById('reviewCount').textContent = rc + (rc === 1 ? ' avaliação' : ' avaliações');

        if (s.description) document.getElementById('storeDesc').textContent = s.description;
        else document.getElementById('aboutSection').style.display = 'none';

        if (s.phone) {
          storePhone = s.phone;
          document.getElementById('phoneRow').style.display = 'flex';
          document.getElementById('storePhone').textContent = s.phone;
        }
        if (s.address) {
          document.getElementById('addrRow').style.display = 'flex';
          document.getElementById('storeAddr').textContent = s.address;
        }
        document.getElementById('delivTime').textContent = s.deliveryTime || 'Consulte a loja';

        // Status + horários
        renderStatusBadge(s);
        renderHours(s);

        // Reavalia status a cada minuto
        setInterval(() => renderStatusBadge(s), 60000);
      } catch(e) { console.error(e); showToast('Erro ao carregar'); }
    }

    let currentReportReview = null;

    function openReportReviewModal(reviewId) {
      currentReportReview = reviewId;
      const input = document.getElementById('reportReviewReason');
      if (input) input.value = '';
      document.getElementById('reportReviewModal')?.classList.add('active');
    }

    function closeReportReviewModal() {
      document.getElementById('reportReviewModal')?.classList.remove('active');
      currentReportReview = null;
    }

    async function submitReviewReport() {
      if (!currentReportReview) return;
      const reason = (document.getElementById('reportReviewReason')?.value || '').trim();
      if (!reason) return showToast('Informe o motivo da denúncia');

      try {
        const review = (window.__loadedReviews || []).find(r => r.id === currentReportReview) || {};
        await db.collection('reviewReports').add({
          reviewId: currentReportReview,
          storeId,
          reason,
          status: 'open',
          reviewSnapshot: {
            userName: review.userName || '',
            comment: review.comment || '',
            storeRating: review.storeRating || null,
            driverRating: review.driverRating || null,
            createdAt: review.createdAt || null
          },
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        closeReportReviewModal();
        showToast('Denúncia enviada');
      } catch (e) {
        console.error(e);
        showToast('Erro ao enviar denúncia');
      }
    }

    async function loadReviews() {
      try {
        const snap = await db.collection('reviews')
          .where('storeId','==',storeId)
          .orderBy('createdAt','desc')
          .limit(20).get();
        const reviews = snap.docs.map(d=>({id:d.id,...d.data()}));
        window.__loadedReviews = reviews;
        const el = document.getElementById('reviewsList');

        if (reviews.length > 0) {
          const avg = reviews.reduce((s,r)=>s+(r.storeRating||0),0)/reviews.length;
          document.getElementById('ratingVal').textContent = avg.toFixed(1);
          document.getElementById('reviewCount').textContent = reviews.length+(reviews.length===1?' avaliação':' avaliações');
        }

        if (!reviews.length) {
          el.innerHTML = '<div class="empty-reviews"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px;opacity:.3;margin-bottom:10px"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><div>Ainda não há avaliações</div></div>';
          return;
        }

        el.innerHTML = reviews.map(r => `
          <div class="review-item">
            <div class="review-head">
              <div class="review-author">${esc(r.userName||'Cliente')}</div>
              <div class="review-date">${fmtDate(r.createdAt)}</div>
            </div>
            <div class="review-stars">
              <div class="review-stars-item"><span>Loja:</span> <span class="stars">${stars(r.storeRating||0)}</span> <span>${r.storeRating||0}/5</span></div>
              ${r.driverRating ? `<div class="review-stars-item"><span>Entrega:</span> <span class="stars">${stars(r.driverRating)}</span> <span>${r.driverRating}/5</span></div>` : ''}
            </div>
            ${r.comment ? `<div class="review-comment">"${esc(r.comment)}"</div>` : ''}
            <button class="review-report-btn" type="button" onclick="openReportReviewModal('${r.id}')">Denunciar avaliação</button>
          </div>
        `).join('');
      } catch(e) {
        console.error(e);
        document.getElementById('reviewsList').innerHTML = '<div class="empty-reviews"><div>Erro ao carregar avaliações</div></div>';
      }
    }

    (async()=>{ await loadStoreInfo(); await loadReviews(); })();
  </script>
</body>
</html>
