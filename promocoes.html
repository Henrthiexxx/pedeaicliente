<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Promoções — Pedra Delivery</title>
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<script>(function(){var t=localStorage.getItem('pedrad-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="client.css">
<script src="pwa-register.js" defer></script>
<script src="page-transition.js" defer></script>
<style>
@keyframes appIn {
  from { opacity: 0; transform: scale(1.03); }
  to   { opacity: 1; transform: scale(1); }
}
body { animation:appIn .21s cubic-bezier(.16,1,.3,1) both; }

:root {
  --g:        #22c55e;
  --g-dim:    rgba(34,197,94,.10);
  --surface:  #0e0e11;
  --surface-2:#121216;
  --glass:    rgba(14,14,17,.84);
  --orange:   #f97316;
  --bottom-nav-h: calc(64px + env(safe-area-inset-bottom, 0px));
}

html { height: 100%; overflow: hidden; background: #080808; }

body {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
  background:
    radial-gradient(ellipse 120% 36% at 50% 0%, #1a0c04 0%, transparent 60%),
    radial-gradient(ellipse 80% 20% at 50% 100%, #090d0a 0%, transparent 58%),
    #080808;
}

.of-scroll {
  position: absolute;
  top: 0; left: 0; right: 0;
  bottom: 0;
  overflow-x: hidden;
  overflow-y: auto;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #2a2a34; border-radius: 2px; }

/* ════════════════════════════════
   STICKY TOOLBAR (header + search + pills)
════════════════════════════════ */
.of-toolbar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid rgba(255,255,255,.04);
}

/* ── Header row ── */
.of-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 16px 12px;
}

.of-back {
  width: 36px; height: 36px;
  border: none;
  background: var(--surface-2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #8888a0;
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.of-back:hover { background: #1c1c22; color: #f0f0f2; }
.of-back svg { width: 17px; height: 17px; }

.of-hdr-info { flex: 1; }
.of-hdr-title {
  font-size: 1rem;
  font-weight: 800;
  color: #f0f0f2;
  letter-spacing: -.03em;
}
.of-hdr-sub {
  font-size: .6rem;
  font-weight: 700;
  color: var(--orange);
  letter-spacing: .08em;
  text-transform: uppercase;
  opacity: .65;
  margin-top: 1px;
}

.of-count-badge {
  font-size: .62rem;
  font-weight: 700;
  color: #44444e;
  background: var(--surface-2);
  border: 1px solid #1e1e26;
  border-radius: 999px;
  padding: 3px 9px;
  flex-shrink: 0;
}

/* ── Search bar ── */
.of-search {
  padding: 0 16px 12px;
}

.of-search-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid #1e1e26;
  border-radius: 999px;
  padding: 0 16px;
  transition: border-color .18s, box-shadow .18s;
}
.of-search-wrap:focus-within {
  border-color: rgba(34,197,94,.35);
  box-shadow: 0 0 0 3px rgba(34,197,94,.06);
}
.of-search-wrap svg {
  width: 16px; height: 16px;
  color: #44444e;
  flex-shrink: 0;
}
.of-search-input {
  flex: 1;
  padding: 11px 0;
  background: none;
  border: none;
  color: #f0f0f2;
  font-family: inherit;
  font-size: .88rem;
  outline: none;
}
.of-search-input::placeholder { color: #44444e; }

.of-search-clear {
  background: none;
  border: none;
  color: #44444e;
  cursor: pointer;
  padding: 4px;
  display: none;
  align-items: center;
  justify-content: center;
  transition: color .15s;
  border-radius: 50%;
  flex-shrink: 0;
}
.of-search-clear.show { display: flex; }
.of-search-clear:hover { color: #f0f0f2; }
.of-search-clear svg { width: 14px; height: 14px; }

/* ── Category pills ── */
.of-cats {
  display: flex;
  gap: 7px;
  padding: 0 16px 12px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.of-cats::-webkit-scrollbar { display: none; }
.of-cats.hidden { display: none; }

.of-cat {
  flex-shrink: 0;
  padding: 8px 16px;
  font-size: .72rem;
  font-weight: 600;
  border-radius: 12px;
  border: 1px solid #191920;
  background: #111116;
  color: #505060;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  transition: all .18s;
  letter-spacing: -.01em;
  box-shadow: 0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.04);
}
.of-cat:hover {
  border-color: #252530;
  color: #b0b0c0;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
}
.of-cat.active {
  background: var(--g-dim);
  border-color: rgba(34,197,94,.28);
  color: var(--g);
  box-shadow: 0 4px 16px rgba(34,197,94,.14), inset 0 1px 0 rgba(34,197,94,.12);
}

/* ════════════════════════════════
   CONTENT
════════════════════════════════ */
.of-content {
  padding: 14px 12px 32px;
  max-width: 820px;
  margin: 0 auto;
}

/* ── No results ── */
.of-empty {
  padding: 56px 20px;
  text-align: center;
}
.of-empty-icon {
  width: 52px; height: 52px;
  margin: 0 auto 14px;
  border-radius: 16px;
  background: rgba(249,115,22,.06);
  border: 1px solid rgba(249,115,22,.14);
  display: flex; align-items: center; justify-content: center;
  color: var(--orange);
  opacity: .55;
}
.of-empty-icon svg { width: 22px; height: 22px; }
.of-empty-title { font-size: .9rem; font-weight: 700; color: #34343e; margin-bottom: 4px; }
.of-empty-sub   { font-size: .76rem; color: #28282e; line-height: 1.5; }

.of-loading {
  padding: 72px 20px;
  text-align: center;
  color: #40404e;
  font-size: .82rem;
}

/* ── Grid ── */
.of-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

/* ── Product card ── */
.of-card {
  background: var(--surface);
  border: 1px solid #161619;
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s cubic-bezier(.22,.61,.36,1),
              border-color .2s,
              box-shadow .2s;
  display: flex;
  flex-direction: column;
}

.of-card:hover {
  transform: translateY(-4px);
  border-color: #252530;
  box-shadow:
    0 12px 32px rgba(0,0,0,.55),
    0 4px 12px rgba(0,0,0,.35),
    0 0 0 1px rgba(255,255,255,.04);
}

.of-card:active { transform: scale(.97); }

/* ── Image area ── */
.of-img {
  position: relative;
  height: 132px;
  background: #141418;
  overflow: hidden;
  flex-shrink: 0;
}
.of-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .3s ease;
}
.of-card:hover .of-img img { transform: scale(1.04); }

.of-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: #282830;
  font-size: 2rem;
}

/* ── Discount badge ── */
.of-badge {
  position: absolute;
  top: 9px; left: 9px;
  background: linear-gradient(135deg, #fb923c, #f97316);
  color: #fff;
  font-size: .62rem;
  font-weight: 800;
  letter-spacing: .02em;
  padding: 4px 8px;
  border-radius: 999px;
  box-shadow: 0 4px 12px rgba(249,115,22,.45), inset 0 1px 0 rgba(255,255,255,.2);
}

/* ── Card body ── */
.of-body {
  padding: 11px 12px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.of-name {
  font-size: .84rem;
  font-weight: 700;
  color: #d0d0da;
  line-height: 1.25;
  letter-spacing: -.02em;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.2em;
}

.of-store {
  font-size: .66rem;
  color: #44444e;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.of-price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: auto;
  padding-top: 8px;
  flex-wrap: wrap;
}
.of-price-now {
  font-size: .96rem;
  font-weight: 800;
  color: var(--g);
  letter-spacing: -.02em;
}
.of-price-old {
  font-size: .7rem;
  color: #404050;
  text-decoration: line-through;
}

/* ── Ver button (bottom of card) ── */
.of-ver-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  margin: 8px 12px 12px;
  padding: 9px 0;
  background: rgba(34,197,94,.07);
  border: 1px solid rgba(34,197,94,.18);
  border-radius: 12px;
  font-size: .72rem;
  font-weight: 700;
  color: var(--g);
  letter-spacing: .01em;
  transition: background .15s, border-color .15s, box-shadow .15s;
}
.of-ver-btn svg { width: 12px; height: 12px; }
.of-card:hover .of-ver-btn {
  background: rgba(34,197,94,.13);
  border-color: rgba(34,197,94,.3);
  box-shadow: 0 4px 14px rgba(34,197,94,.15);
}

/* ════════════════════════════════
   RESPONSIVE
════════════════════════════════ */
@media (max-width: 400px) {
  .of-grid { gap: 8px; }
  .of-img { height: 112px; }
  .of-name { font-size: .78rem; }
  .of-price-now { font-size: .88rem; }
}
</style>
</head>
<body class="page-enter">
<div class="of-scroll">

  <!-- ══════════ TOOLBAR ══════════ -->
  <div class="of-toolbar">
    <div class="of-hdr">
      <button class="of-back" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="of-hdr-info">
        <div class="of-hdr-title">Promoções</div>
        <div class="of-hdr-sub">Ofertas ativas agora</div>
      </div>
      <div class="of-count-badge" id="ofCount">—</div>
    </div>

    <div class="of-search">
      <div class="of-search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="of-search-input" id="ofSearch"
          placeholder="Buscar produto ou loja…"
          autocomplete="off"
          oninput="onSearch(this.value)">
        <button class="of-search-clear" id="ofClear" onclick="clearSearch()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="of-cats hidden" id="ofCats"></div>
  </div>

  <!-- ══════════ CONTENT ══════════ -->
  <div class="of-content">
    <div id="ofGrid">
      <div class="of-loading">Buscando promoções…</div>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyAnIJRcUxN-0swpVnonPbJjTSK87o4CQ_g",authDomain:"pedrad-814d0.firebaseapp.com",projectId:"pedrad-814d0",storageBucket:"pedrad-814d0.appspot.com",messagingSenderId:"293587190550",appId:"1:293587190550:web:80c9399f82847c80e20637"};
if(!firebase.apps.length)firebase.initializeApp(FC);
const auth=firebase.auth();
const db=firebase.firestore();

function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function money(v){return(Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function imgOf(p){return(p.imageData||p.imageUrl||'').trim()}
function isVisibleStore(s){return s&&s.active!==false&&!s.suspended&&s.status!=='blocked'&&s.status!=='pending'}
function promoPrice(p){return Number(p.promoPrice||p.discountPrice||p.salePrice||0)}
function comparePrice(p){return Number(p.oldPrice||p.originalPrice||p.compareAtPrice||0)}
function tsDate(v){return v?.toDate?.()||new Date(v||0)}

function isPromo(p){
  const price=Number(p.price||0);
  const promo=promoPrice(p);
  const old=comparePrice(p);
  const has=p.promo===true||p.promotional===true||p.promotion===true||p.onSale===true
    ||Number(p.discount)>0||(promo>0&&promo<price)||(old>price);
  if(!has||p.promotionStatus==='inactive')return false;
  const now=Date.now();
  const start=tsDate(p.promotionStartsAt).getTime()||0;
  const end=tsDate(p.promotionEndsAt).getTime()||0;
  return(!start||start<=now)&&(!end||end>=now);
}

function currentPrice(p){
  const promo=promoPrice(p),price=Number(p.price||0);
  return promo>0&&promo<price?promo:price;
}
function fromPrice(p){
  const old=comparePrice(p),price=Number(p.price||0);
  return old>price?old:(currentPrice(p)<price?price:0);
}
function discountLabel(p){
  const from=fromPrice(p),to=currentPrice(p);
  if(from>to&&to>0)return Math.round((1-to/from)*100)+'% OFF';
  const d=Number(p.discount||0);
  return d>0?Math.round(d)+'% OFF':'Oferta';
}

// ── State ──
let allOffers=[], activeCat='all', searchQ='';

// ── Filtering ──
function filtered(){
  return allOffers.filter(p=>{
    if(activeCat!=='all'&&(p.category||'')!==activeCat)return false;
    if(searchQ){
      const q=searchQ.toLowerCase();
      return (p.name||'').toLowerCase().includes(q)
        ||(p.description||'').toLowerCase().includes(q)
        ||(p.store?.name||'').toLowerCase().includes(q);
    }
    return true;
  });
}

function render(){
  const list=filtered();
  const grid=document.getElementById('ofGrid');
  const countEl=document.getElementById('ofCount');

  countEl.textContent=list.length===allOffers.length
    ?`${allOffers.length} ${allOffers.length===1?'oferta':'ofertas'}`
    :`${list.length} de ${allOffers.length}`;

  if(!list.length){
    grid.innerHTML=`<div class="of-empty">
      <div class="of-empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <div class="of-empty-title">${searchQ?'Nenhum resultado':'Nenhuma promoção'}</div>
      <div class="of-empty-sub">${searchQ?`Sem resultados para "<strong>${esc(searchQ)}</strong>"<br>Tente outro termo.`:'Não há promoções ativas no momento.'}</div>
    </div>`;
    return;
  }

  grid.innerHTML=`<div class="of-grid">${list.map(renderCard).join('')}</div>`;
}

function renderCard(p){
  const img=imgOf(p);
  const to=currentPrice(p);
  const from=fromPrice(p);
  const url=`store.html?id=${encodeURIComponent(p.storeId)}&productId=${encodeURIComponent(p.id)}`;
  return`<article class="of-card" onclick="location.href='${url}'">
  <div class="of-img">
    ${img
      ?`<img src="${esc(img)}" alt="${esc(p.name)}" loading="lazy">`
      :`<div class="of-img-placeholder">🍽</div>`}
    <div class="of-badge">${esc(discountLabel(p))}</div>
  </div>
  <div class="of-body">
    <div class="of-name">${esc(p.name||'Produto')}</div>
    <div class="of-store">${esc(p.store?.name||'Loja')}</div>
    <div class="of-price-row">
      <span class="of-price-now">${money(to)}</span>
      ${from>to?`<span class="of-price-old">${money(from)}</span>`:''}
    </div>
  </div>
  <div class="of-ver-btn">
    Ver oferta
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
    </svg>
  </div>
</article>`;
}

// ── Category pills ──
function renderCats(){
  const cats=[...new Set(allOffers.map(p=>p.category).filter(Boolean))].sort();
  const el=document.getElementById('ofCats');
  if(cats.length<2){el.classList.add('hidden');return;}
  el.classList.remove('hidden');
  el.innerHTML=
    `<button class="of-cat${activeCat==='all'?' active':''}" onclick="setCat('all')">Todos</button>`
    +cats.map(c=>`<button class="of-cat${activeCat===c?' active':''}" onclick="setCat('${esc(c)}')">${esc(c)}</button>`).join('');
}

function setCat(c){activeCat=c;renderCats();render();}

// ── Search handlers ──
function onSearch(v){
  searchQ=v.trim();
  document.getElementById('ofClear').classList.toggle('show',searchQ.length>0);
  render();
}
function clearSearch(){
  document.getElementById('ofSearch').value='';
  searchQ='';
  document.getElementById('ofClear').classList.remove('show');
  render();
}

// ── Load ──
async function loadOffers(){
  const[productSnap,storeSnap]=await Promise.all([
    db.collection('products').get(),
    db.collection('stores').get()
  ]);
  const stores={};
  storeSnap.docs.forEach(doc=>{
    const s={id:doc.id,...doc.data()};
    if(isVisibleStore(s))stores[s.id]=s;
  });
  allOffers=productSnap.docs.map(doc=>({id:doc.id,...doc.data()}))
    .filter(p=>p.active!==false&&p.available!==false&&p.storeId&&stores[p.storeId]&&isPromo(p))
    .map(p=>({...p,store:stores[p.storeId]}))
    .sort((a,b)=>Number(b.discount||0)-Number(a.discount||0)||(a.name||'').localeCompare(b.name||'','pt-BR'));
  renderCats();
  render();
}

auth.onAuthStateChanged(user=>{
  if(!user){
    location.replace('index.html');
    return;
  }
  loadOffers().catch(err=>{
    console.error(err);
    document.getElementById('ofGrid').innerHTML=`<div class="of-empty">
      <div class="of-empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <div class="of-empty-title">Erro ao carregar</div>
      <div class="of-empty-sub">Não foi possível carregar as promoções.<br>Verifique sua conexão.</div>
    </div>`;
  });
});
</script>
<script src="safe-area.js" defer></script>
<script src="swipe-back.js" defer></script>
</body>
</html>
