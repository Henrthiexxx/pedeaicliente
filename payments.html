<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#080808">
<title>Pagamentos - Pedra Delivery</title>
<script>(function(){var t=localStorage.getItem('pedrad-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="client.css">
<style>
body{margin:0;color:var(--text-0);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.hdr{position:sticky;top:0;z-index:10;height:56px;background:rgba(8,8,8,.92);backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:10px;padding:0 14px}
.back{width:36px;height:36px;border:none;background:#111116;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#8888a0;cursor:pointer;flex-shrink:0;transition:background .15s,color .15s}
.back:hover{background:#1c1c24;color:#f0f0f2}
.back svg{width:18px;height:18px}
.page{max-width:560px;margin:0 auto;padding:18px 16px}
.card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.muted{color:var(--text-2);font-size:.86rem;line-height:1.5}
</style>
</head>
<body class="page-enter">
<header class="hdr">
  <button class="back" onclick="goBack()" aria-label="Voltar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <strong>Pagamentos</strong>
</header>
<main class="page">
  <section class="card">
    <h1>Pagamentos</h1>
    <p class="muted">Pagina reservada para informacoes de pagamento, comprovantes e orientacoes. Depois preenchemos conforme a operacao.</p>
  </section>
</main>
<script>function goBack(){if(document.referrer&&document.referrer.includes(location.host))history.back();else location.href='help.html'}</script>
<script src="safe-area.js" defer></script>
<script src="swipe-back.js" defer></script>
</body>
</html>
