<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Pedrad</title>
<meta name="theme-color" content="#09090b">
<script>(function(){var t=localStorage.getItem('pedrad-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="client.css">
<style>
.home-header{padding:20px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.home-title{font-size:1.2rem;font-weight:700;letter-spacing:-.03em}
.home-search{padding:0 16px 14px}
.home-search input{width:100%;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text-0);font-family:inherit;font-size:.86rem}
.home-search input:focus{outline:none;border-color:var(--border-h)}
.cat-filter{display:flex;gap:6px;padding:0 16px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cat-btn{padding:6px 14px;font-size:.76rem;border-radius:20px;border:1px solid var(--border);color:var(--text-2);background:var(--bg-1);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.cat-btn:hover{border-color:var(--border-h);color:var(--text-0)}
.cat-btn.active{background:var(--accent);color:var(--accent-t);border-color:var(--accent)}

/* ===== LISTA VERTICAL ===== */
.stores-list{display:flex;flex-direction:column;gap:8px;padding:0 16px 80px}
.store-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s;box-shadow:var(--sh-sm)}
.store-row:hover{border-color:var(--border-h);box-shadow:var(--sh-md);transform:translateY(-1px)}
.sr-img{width:64px;height:64px;border-radius:50%;background:var(--bg-2);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--text-3);flex:0 0 auto;border:1px solid var(--border)}
.sr-img img{width:100%;height:100%;object-fit:cover}
.sr-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.sr-name{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-desc{font-size:.74rem;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{display:flex;gap:8px;font-size:.7rem;color:var(--text-2);align-items:center;flex-wrap:wrap}
.sr-meta .dot{opacity:.5}
.sr-tag{padding:2px 7px;border-radius:10px;background:var(--bg-2);border:1px solid var(--border);font-size:.64rem;color:var(--text-2)}
.sr-info-btn{flex:0 0 auto;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg-2);color:var(--text-2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.sr-info-btn:hover{border-color:var(--border-h);color:var(--text-0);background:var(--bg-3)}
.sr-info-btn svg{width:18px;height:18px}
.empty{padding:60px 20px;text-align:center;color:var(--text-3);font-size:.88rem}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="home-header">
    <div class="home-title">Pedrad</div>
    <button class="hdr-btn" onclick="toggleTheme()" title="Tema">◐</button>
</div>

<div class="home-search">
    <input id="searchInput" placeholder="Buscar restaurantes..." oninput="render()">
</div>

<div class="cat-filter" id="catFilter"></div>
<div class="stores-list" id="storesList">
    <div class="loading-state">Carregando lojas...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyAnIJRcUxN-0swpVnonPbJjTSK87o4CQ_g",authDomain:"pedrad-814d0.firebaseapp.com",projectId:"pedrad-814d0",storageBucket:"pedrad-814d0.appspot.com",messagingSenderId:"293587190550",appId:"1:293587190550:web:80c9399f82847c80e20637"};
if(!firebase.apps.length)firebase.initializeApp(FC);
const db=firebase.firestore();

let stores=[],catFilter='all';
const DAY_KEYS=['sun','mon','tue','wed','thu','fri','sat'];

function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function money(v){return(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
function getTheme(){return localStorage.getItem('pedrad-theme')||'dark'}
function toggleTheme(){const n=getTheme()==='dark'?'light':'dark';localStorage.setItem('pedrad-theme',n);document.documentElement.setAttribute('data-theme',n)}

// ===== STATUS ABERTO/FECHADO =====
function parseHM(s){const[h,m]=String(s||'00:00').split(':').map(Number);return(h||0)*60+(m||0)}

function legacyHoursToNew(s){
    if(!s) return null;
    const wO=s.weekdayOpen, wC=s.weekdayClose, eO=s.weekendOpen, eC=s.weekendClose;
    if(!wO && !eO) return null;
    const wOpen=wO||'11:00', wClose=wC||'22:00';
    const eOpen=eO||'11:00', eClose=eC||'23:00';
    return {
        mon:{enabled:true,open:wOpen,close:wClose}, tue:{enabled:true,open:wOpen,close:wClose},
        wed:{enabled:true,open:wOpen,close:wClose}, thu:{enabled:true,open:wOpen,close:wClose},
        fri:{enabled:true,open:wOpen,close:wClose},
        sat:{enabled:true,open:eOpen,close:eClose}, sun:{enabled:true,open:eOpen,close:eClose},
        holidays:{enabled:false,open:'11:00',close:'22:00'}
    };
}

function isStoreOpen(store){
    if(store.manuallyClosed===true)return false;
    const hours=store?.settings?.hours||legacyHoursToNew(store?.settings);
    if(!hours)return store.open!==false;
    const now=new Date();
    const day=hours[DAY_KEYS[now.getDay()]];
    if(!day||day.enabled===false)return false;
    const cur=now.getHours()*60+now.getMinutes();
    const open=parseHM(day.open),close=parseHM(day.close);
    if(open===close)return false;
    return close>open?(cur>=open&&cur<close):(cur>=open||cur<close);
}

async function loadStores(){
    const snap=await db.collection('stores').get();
    stores=snap.docs
        .map(d=>({id:d.id,...d.data()}))
        .filter(s=>!s.suspended && isStoreOpen(s));
    stores.sort((a,b)=>(a.name||'').localeCompare(b.name||'','pt-BR'));
    renderCats();render();
}

// Reavalia a cada 60s — refresca lista quando uma loja abre/fecha
setInterval(()=>{ loadStores(); }, 60000);

function renderCats(){
    const cats=[...new Set(stores.map(s=>s.category).filter(Boolean))].sort();
    document.getElementById('catFilter').innerHTML=
        `<button class="cat-btn ${catFilter==='all'?'active':''}" onclick="setCat('all')">Todos</button>`
        +cats.map(c=>`<button class="cat-btn ${catFilter===c?'active':''}" onclick="setCat('${esc(c)}')">${esc(c)}</button>`).join('');
}

function setCat(c){catFilter=c;renderCats();render()}
function goStore(id){location.href='store.html?id='+id}
function goInfo(id,e){if(e)e.stopPropagation();location.href='store-info.html?id='+id}

function render(){
    const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
    let list=[...stores];
    if(catFilter!=='all')list=list.filter(s=>(s.category||'')===catFilter);
    if(q)list=list.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.description||'').toLowerCase().includes(q));
    const el=document.getElementById('storesList');
    if(!list.length){el.innerHTML='<div class="empty">Nenhuma loja aberta no momento</div>';return}
    el.innerHTML=list.map(s=>{
        const img=s.imageUrl||'';
        const desc=s.description?(s.description.length>60?s.description.slice(0,58)+'…':s.description):'';
        return`<div class="store-row" onclick="goStore('${s.id}')">
            <div class="sr-img">${img?`<img src="${esc(img)}" alt="">`:'—'}</div>
            <div class="sr-body">
                <div class="sr-name">${esc(s.name)}</div>
                ${desc?`<div class="sr-desc">${esc(desc)}</div>`:''}
                <div class="sr-meta">
                    ${s.rating?`<span>★ ${s.rating.toFixed(1)}</span><span class="dot">·</span>`:''}
                    ${s.deliveryTime?`<span>${esc(s.deliveryTime)}</span><span class="dot">·</span>`:''}
                    <span>${s.deliveryFee?money(s.deliveryFee):'Grátis'}</span>
                    ${s.category?`<span class="sr-tag">${esc(s.category)}</span>`:''}
                </div>
            </div>
            <button class="sr-info-btn" onclick="goInfo('${s.id}',event)" title="Informações">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="16" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
            </button>
        </div>`;
    }).join('');
}

loadStores();
</script>

<nav class="client-nav"><a class="cnav-item active" href="home.html"><span class="cnav-icon">⌂</span>Início</a><a class="cnav-item" href="orders.html"><span class="cnav-icon">≡</span>Pedidos</a><a class="cnav-item" href="profile.html"><span class="cnav-icon">○</span>Perfil</a></nav>
</body>
</html>
