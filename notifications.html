<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>(function(){var t=localStorage.getItem('pedrad-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#080808"/>
  <title>Notificações — Pedra Delivery</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="client.css"/>
  <script src="pwa-register.js" defer></script>
  <script src="page-transition.js" defer></script>
  <style>
    :root{
      --g:#22c55e;--g-dim:rgba(34,197,94,.10);--g-glow:rgba(34,197,94,.22);
      --surface:#0e0e11;--surface-2:#121216;--glass:rgba(14,14,17,.82);
    }
    html,body{height:100%;overflow:hidden;background:#080808;margin:0;padding:0}
    body{
      font-family:var(--font,'DM Sans',system-ui,sans-serif);
      background:radial-gradient(ellipse 110% 32% at 50% 0%,#0d2018 0%,transparent 68%),#080808;
      color:var(--text-0,#d8d8e0);height:100%;overflow-y:auto;overflow-x:hidden;
      overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent;max-width:600px;margin:0 auto
    }
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#2a2a34;border-radius:2px}
    @keyframes appIn{from{opacity:0;transform:scale(1.025)}to{opacity:1;transform:scale(1)}}
    .page-enter{animation:appIn .21s cubic-bezier(.16,1,.3,1) both}
    .notifications-header{
      position:sticky;top:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      height:54px;padding:0 14px;
      background:var(--glass);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
      border-bottom:1px solid rgba(255,255,255,.04)
    }
    .notifications-title{font-size:.92rem;font-weight:700;letter-spacing:-.015em;flex:1;text-align:center}
    .header-left,.header-right{width:80px;display:flex;align-items:center}
    .header-right{justify-content:flex-end;gap:8px}

    .back-btn,.icon-btn{
      width:34px;height:34px;border-radius:10px;border:none;background:transparent;
      color:var(--text-2,#505060);display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:color .15s,background .15s;flex-shrink:0
    }
    .back-btn:hover,.icon-btn:hover{color:var(--text-0,#d8d8e0);background:rgba(255,255,255,.06)}
    .icon-btn.danger:hover{color:#f87171;background:rgba(248,113,113,.08)}

    .count-chip{
      border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
      color:var(--text-2,#505060);border-radius:999px;padding:3px 9px;
      font-size:.7rem;font-weight:700;display:none;white-space:nowrap
    }

    /* ── Content ── */
    .notifications-content{padding:12px}
    .tools-bar{display:flex;gap:8px;margin-bottom:12px}
    .tool-btn{
      flex:1;border-radius:12px;background:var(--surface);border:1px solid var(--border,#161619);
      color:var(--text-0,#d8d8e0);padding:10px 12px;cursor:pointer;font-family:inherit;
      transition:border-color .18s,transform .15s;
      display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:.83rem
    }
    .tool-btn:hover{border-color:#222228;transform:translateY(-1px)}
    .tool-btn:active{transform:none}
    .tool-btn.danger:hover{border-color:rgba(248,113,113,.4);color:#f87171}

    /* ── Cards ── */
    .notification-item{
      display:flex;gap:12px;padding:14px;
      background:var(--surface);border:1px solid var(--border,#161619);border-radius:16px;
      margin-bottom:8px;cursor:pointer;
      transition:border-color .18s,background .18s;position:relative;overflow:hidden
    }
    .notification-item::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .18s;pointer-events:none}
    .notification-item:hover{border-color:#222228}
    .notification-item:hover::before{background:rgba(255,255,255,.016)}
    .notification-item.unread{border-left:2px solid var(--g)}
    .notification-item.unread .notification-title{color:#fff}
    @keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    .notification-icon{
      width:40px;height:40px;border-radius:12px;
      border:1px solid var(--border,#161619);background:var(--surface-2);
      display:flex;align-items:center;justify-content:center;
      font-size:.68rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
      color:var(--text-2,#505060);flex-shrink:0
    }
    .notification-item.unread .notification-icon{border-color:var(--g-glow);color:var(--g)}

    .notification-content{flex:1;min-width:0}
    .notification-title{font-weight:700;font-size:.88rem;color:var(--text-0,#d8d8e0);margin-bottom:3px;line-height:1.3}
    .notification-message{font-size:.80rem;color:var(--text-2,#505060);margin-bottom:8px;line-height:1.4;overflow-wrap:anywhere}
    .notification-meta{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text-2,#505060)}

    .pill{border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.025);border-radius:999px;padding:3px 8px;white-space:nowrap}
    .pill.unread-pill{border-color:var(--g-glow);background:var(--g-dim);color:var(--g)}

    .notification-actions{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:6px;flex-shrink:0}
    .small-btn{
      border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.025);
      color:var(--text-2,#505060);border-radius:9px;height:30px;min-width:44px;padding:0 8px;
      cursor:pointer;transition:border-color .15s,color .15s,transform .15s;
      font-weight:700;font-size:.7rem;letter-spacing:.3px;text-transform:uppercase;font-family:inherit
    }
    .small-btn:hover{border-color:rgba(255,255,255,.15);color:var(--text-0,#d8d8e0);transform:translateY(-1px)}
    .small-btn.danger:hover{border-color:rgba(248,113,113,.35);color:#f87171}

    /* ── Empty ── */
    .empty-state{text-align:center;padding:48px 16px;background:var(--surface);border:1px solid var(--border,#161619);border-radius:18px}
    .empty-state-icon{
      width:52px;height:52px;border-radius:14px;border:1px solid var(--border,#161619);background:var(--surface-2);
      display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;
      color:var(--text-2,#505060);font-weight:800;font-size:.68rem;text-transform:uppercase
    }
    .empty-state-title{font-size:.94rem;font-weight:800;margin-bottom:6px;letter-spacing:-.01em}
    .empty-state-text{color:var(--text-2,#505060);font-size:.82rem}

    /* ── Modal ── */
    .modal-ui{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:99999;padding:16px}
    .modal-ui.show{display:flex}
    .modal-ui-card{width:min(480px,100%);background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:20px;box-shadow:0 24px 60px rgba(0,0,0,.7);padding:20px}
    .modal-ui-title{font-weight:800;letter-spacing:-.02em;margin-bottom:8px;font-size:.96rem}
    .modal-ui-text{color:var(--text-2,#505060);line-height:1.5;margin-bottom:18px;font-size:.85rem;white-space:pre-wrap;overflow-wrap:anywhere}
    .modal-ui-actions{display:flex;gap:8px;justify-content:flex-end}
    .btn-ui{height:38px;padding:0 14px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:var(--surface-2);color:var(--text-0,#d8d8e0);font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;font-size:.83rem}
    .btn-ui:hover{border-color:rgba(255,255,255,.18);transform:translateY(-1px)}
    .btn-ui.primary{background:var(--g);border-color:var(--g);color:#041a0c;font-weight:800}
    .btn-ui.primary:hover{opacity:.9;transform:translateY(-1px)}
  </style>
  <script>function esc(s){if(typeof s!='string')return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}</script>
</head>

<body class="page-enter">
  <!-- Header -->
  <div class="notifications-header">
    <div class="header-left">
      <button class="back-btn" type="button" onclick="goBack()" aria-label="Voltar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <div class="notifications-title">Notificações</div>
    <div class="header-right">
      <div class="count-chip" id="countChip"></div>
      <button class="icon-btn danger" id="clearBtn" type="button" aria-label="Limpar tudo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="notifications-content">
    <div class="tools-bar">
      <button class="tool-btn" id="markAllBtn" type="button">Marcar tudo como lido</button>
      <button class="tool-btn danger" id="clearAllBtn" type="button">Limpar tudo</button>
    </div>
    <div id="notificationsList"></div>
  </div>
    <div id="uiModal" class="modal-ui" aria-hidden="true">
  <div class="modal-ui-card" role="dialog" aria-modal="true">
    <div class="modal-ui-title" id="uiModalTitle">Aviso</div>
    <div class="modal-ui-text" id="uiModalText"></div>
    <div class="modal-ui-actions">
      <button class="btn-ui" id="uiModalCancel" type="button" style="display:none">Cancelar</button>
      <button class="btn-ui primary" id="uiModalOk" type="button">OK</button>
    </div>
  </div>
</div>

  <script>

    function goBack(){
  // se abriu via link normal e tem histórico
  if (window.history.length > 1) {
    window.history.back();
    // fallback se não voltar em 400ms
    setTimeout(() => {
      if (document.visibilityState === 'visible') window.location.href = 'index.html';
    }, 400);
    return;
  }
  // se abriu direto (sem histórico)
  window.location.href = 'index.html';
}

    // ==================== CACHE (reduz leituras do localStorage) ====================
    // A página agora:
    // - lê do localStorage 1 vez ao abrir (hydrate)
    // - mantém em memória (state)
    // - escreve no localStorage somente quando houver mudança (save)
    // - sem setInterval lendo a cada 30s (isso era "leitura infinita" do storage)

    const STORAGE_KEY = 'notifications';

    const NotifsState = {
      list: [],
      loaded: false
    };

    function hydrateOnce() {
      if (NotifsState.loaded) return;
      try {
        NotifsState.list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch (e) {
        NotifsState.list = [];
      }
      NotifsState.loaded = true;
    }

    function persist() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(NotifsState.list));
      } catch (e) {}
    }

    // ==================== NAV (voltar robusto) ====================
    (function bindBackButton(){
      const btn = document.getElementById('backBtn');
      if (!btn) return;

      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();

        if (window.history.length > 1) window.history.back();
        else window.location.href = 'index.html';
      }, true);
    })();

    // ==================== HELPERS ====================

    function safeText(str) {
      return String(str ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = now - date;

      if (!dateString || isNaN(date.getTime())) return '—';

      if (diff < 60000) return 'Agora';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m atrás`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h atrás`;
      if (diff < 604800000) return `${Math.floor(diff / 86400000)}d atrás`;

      return date.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit' });
    }

    function getIconLabel(n) {
      // Remove emojis/ícones e usa "tags" curtas profissionais
      const title = (n?.title || '').trim().toUpperCase();
      if (title.includes('PEDIDO')) return 'ORD';
      if (title.includes('ENTREGA')) return 'DLV';
      if (title.includes('PAG')) return 'PAY';
      if (title.includes('AVALIA')) return 'REV';
      if (title.includes('CUPOM')) return 'CUP';
      return 'INF';
    }

    function updateHeaderCount() {
      const chip = document.getElementById('countChip');
      if (!chip) return;

      const total = NotifsState.list.length;
      const unread = NotifsState.list.filter(n => !n.read).length;

      if (total === 0) {
        chip.style.display = 'none';
        return;
      }
      chip.style.display = 'inline-flex';
      chip.textContent = unread > 0 ? `${unread} não lidas` : `${total} total`;
    }

    // ==================== ACTIONS (protege a lógica) ====================

    function markAsRead(notificationId) {
      const idx = NotifsState.list.findIndex(n => n.id === notificationId);
      if (idx === -1) return;
      if (NotifsState.list[idx].read) return;

      NotifsState.list[idx] = { ...NotifsState.list[idx], read: true };
      persist();
      renderNotifications();
    }

    function markAllAsRead() {
      if (NotifsState.list.length === 0) return;

      let changed = false;
      NotifsState.list = NotifsState.list.map(n => {
        if (!n.read) { changed = true; return { ...n, read: true }; }
        return n;
      });

      if (changed) persist();
      renderNotifications();
    }

async function deleteNotification(notificationId, event) {
  event?.stopPropagation?.();

  const idx = NotifsState.list.findIndex(n => n.id === notificationId);
  if (idx === -1) return;

  const ok = await UIModal.confirm({ text: 'Deletar esta notificação?' });
  if (!ok) return;

  NotifsState.list.splice(idx, 1);
  persist();
  renderNotifications();
}

async function clearAll() {
  if (NotifsState.list.length === 0) {
    await UIModal.alert({ text: 'Não há notificações para limpar' });
    return;
  }

  const ok = await UIModal.confirm({
    text: `Deletar todas as ${NotifsState.list.length} notificações?`
  });
  if (!ok) return;

  NotifsState.list = [];
  persist();
  renderNotifications();
}

function refreshFromStorage() {
  try {
    const latest = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    NotifsState.list = Array.isArray(latest) ? latest : [];
    renderNotifications();
  } catch (e) {
    UIModal.alert({ text: 'Falha ao atualizar notificações' });
  }
}

    // ==================== RENDER ====================

function renderNotifications() {
  const container = document.getElementById('notificationsList');
  if (!container) return;

  updateHeaderCount();

  const notifications = NotifsState.list;

  // VAZIO (mantido igual ao seu)
  if (notifications.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">NOT</div>
        <div class="empty-state-title">Nenhuma notificação</div>
        <div class="empty-state-text">Quando houver novidades, elas aparecem aqui.</div>
        <div class="tools-bar" style="margin-top:16px;">
          <button class="tool-btn secondary" type="button" onclick="refreshFromStorage()">Atualizar</button>
          <button class="tool-btn" type="button" onclick="window.location.href='orders.html'">Ver pedidos</button>
        </div>
      </div>
    `;
    return;
  }

  // Ordena visualmente: mais recentes primeiro
  const sorted = [...notifications].sort((a, b) => {
    const da = new Date(a.createdAt || 0).getTime();
    const db = new Date(b.createdAt || 0).getTime();
    return db - da;
  });

  container.innerHTML = sorted.map(n => {
    const id = safeText(n.id || '');
    const isUnread = !n.read;
    const tag = getIconLabel(n);
    const title = safeText(n.title || 'Notificação');
    const message = safeText(n.message || '');
    const time = formatDate(n.createdAt);

    return `
      <div class="notification-item ${isUnread ? 'unread' : ''}" onclick="markAsRead('${id}')">
        <div class="notification-icon">${tag}</div>
        <div class="notification-content">
          <div class="notification-title">${title}</div>
          <div class="notification-message">${message}</div>
          <div class="notification-meta">
            <span class="pill">${safeText(time)}</span>
            ${isUnread ? '<span class="pill unread-pill">Nova</span>' : ''}
          </div>
        </div>
        <div class="notification-actions">
          <button class="small-btn" type="button" onclick="event.stopPropagation();markAsRead('${id}')">Ler</button>
          <button class="small-btn danger" type="button" onclick="deleteNotification('${id}',event)">Del</button>
        </div>
      </div>
    `;
  }).join('');
}


    // ==================== INIT ====================

    (function init(){
      hydrateOnce();

      // Botões do header
      const clearBtn = document.getElementById('clearBtn');
      if (clearBtn) clearBtn.addEventListener('click', (e) => { e.preventDefault(); clearAll(); }, true);

      // Botões da barra
      document.getElementById('markAllBtn')?.addEventListener('click', markAllAsRead);
      document.getElementById('clearAllBtn')?.addEventListener('click', clearAll);

      // Se outra aba alterar o localStorage, atualiza aqui (sem polling)
      window.addEventListener('storage', (e) => {
        if (e.key === STORAGE_KEY) {
          refreshFromStorage();
        }
      });

      renderNotifications();
    })();

    const UIModal = (() => {
    const el = document.getElementById('uiModal');
    const titleEl = document.getElementById('uiModalTitle');
    const textEl = document.getElementById('uiModalText');
    const okBtn = document.getElementById('uiModalOk');
    const cancelBtn = document.getElementById('uiModalCancel');

    function open({ title='Aviso', text='', okText='OK', cancelText='Cancelar', showCancel=false }){
      titleEl.textContent = title;
      textEl.textContent = text;
      okBtn.textContent = okText;
      cancelBtn.textContent = cancelText;
      cancelBtn.style.display = showCancel ? 'inline-flex' : 'none';
      el.classList.add('show');
      el.setAttribute('aria-hidden','false');
    }
    function close(){
      el.classList.remove('show');
      el.setAttribute('aria-hidden','true');
    }

    function alert({ title='Aviso', text='', okText='OK' }){
      return new Promise(resolve => {
        open({ title, text, okText, showCancel:false });
        okBtn.onclick = () => { close(); resolve(true); };
        cancelBtn.onclick = null;
      });
    }

    function confirm({ title='Confirmar', text='', okText='Confirmar', cancelText='Cancelar' }){
      return new Promise(resolve => {
        open({ title, text, okText, cancelText, showCancel:true });
        okBtn.onclick = () => { close(); resolve(true); };
        cancelBtn.onclick = () => { close(); resolve(false); };
      });
    }

    // fechar clicando fora
    el.addEventListener('click', (e) => { if (e.target === el) close(); });

    return { alert, confirm };
  })();
    
  </script>


<script src="safe-area.js" defer></script>
<script src="swipe-back.js" defer></script>
</body>
