<style>
	.hdr-btn.icon-svg{display:inline-flex;align-items:center;justify-content:center;padding:0}
	.hdr-btn.icon-svg svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
	.store-header{gap:6px}

	/* ── Store icon (icon mode) ─────────────────────────────── */
	.el-icon-row{padding:16px;display:flex}
	.el-icon-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border);display:block}
	.el-icon-placeholder{background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;color:var(--text-2)}

	/* ── Store banner (banner mode) ─────────────────────────── */
	.bn{position:relative;height:180px;background:linear-gradient(135deg,var(--store-accent,#22c55e),var(--bg-3));overflow:hidden}
	.bn-bg{position:absolute;inset:0;z-index:0}
	.bn-bg-img{width:100%;height:100%;object-fit:cover;display:block}
	.bn-gradient{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.10),rgba(0,0,0,.58));pointer-events:none;z-index:1}
	.bn-logo{position:absolute;width:64px;height:64px;border-radius:50%;background:var(--bg-1);border:3px solid rgba(255,255,255,.9);overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.45);z-index:2}
	.bn-logo img{width:100%;height:100%;object-fit:cover;display:block}
	.bn-logo-letter{font-size:1.5rem;font-weight:800;color:var(--text-0)}
	.bn-logo-left{left:16px;bottom:14px}
	.bn-logo-center{left:50%;bottom:14px;transform:translateX(-50%)}
	.bn-logo-right{right:16px;bottom:14px}
	.bn-copy{position:absolute;bottom:18px;z-index:2;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.6)}
	.bn-copy-left{left:96px;right:16px}
	.bn-copy-right{left:16px;right:96px}
	.bn-title{font-size:1.05rem;font-weight:800;line-height:1.2}
	.bn-sub{font-size:.78rem;opacity:.92;margin-top:4px}
	.bn-below{height:140px}

	/* ── Categories — infinite marquee (scroll mode) ────────── */
	.el-cats-marquee{position:relative;overflow:hidden;border-bottom:1px solid var(--border);padding:10px 0;-webkit-mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent)}
	.el-cats-track{display:inline-flex;gap:6px;padding:0 16px;width:max-content;animation:marqueeCats 32s linear infinite;will-change:transform}
	.el-cats-marquee:hover .el-cats-track,.el-cats-marquee:active .el-cats-track,.el-cats-marquee:focus-within .el-cats-track{animation-play-state:paused}
	@keyframes marqueeCats{from{transform:translateX(0)}to{transform:translateX(-50%)}}
	.el-dir-item.active{background:rgba(34,197,94,.06)}
	.el-dir-item.active span:first-child{color:var(--store-accent);font-weight:700}

	body{background:radial-gradient(ellipse 110% 32% at 50% 0%,#0d2018 0%,transparent 68%),#080808!important}
	body.page-enter{animation:storeFadeIn .21s cubic-bezier(.16,1,.3,1) both;transform:none!important}
	body.modal-open{overflow:hidden}

	#productModal{position:fixed!important;inset:0!important;z-index:10000!important}
	#productModal.active{display:flex!important}
	#productModal .modal-sheet{position:relative;z-index:1;transform:translateZ(0)}

	/* ── Cart Drawer ──────────────────────────────────────────── */
	.cart-drawer{background:radial-gradient(ellipse 120% 35% at 50% 0%,#0d2018 0%,transparent 65%),#080808;border-left:1px solid rgba(255,255,255,.04)}
	.cart-header{background:rgba(14,14,17,.82);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-bottom:1px solid rgba(255,255,255,.04);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px}
	.cart-title{font-size:.96rem;font-weight:700;color:#d8d8e0;letter-spacing:-.02em}
	.cart-close-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:#505060;cursor:pointer;border-radius:10px;transition:color .15s,background .15s;flex-shrink:0}
	.cart-close-btn:hover{color:#d8d8e0;background:rgba(255,255,255,.06)}
	.cart-body{padding:12px;background:transparent}
	.cart-empty{text-align:center;color:#505060;font-size:.88rem;padding:32px 0}
	.ci-card{background:#0e0e11;border:1px solid #161619;border-radius:16px;padding:14px;margin-bottom:8px;transition:border-color .18s,background .18s;position:relative;overflow:hidden}
	.ci-card::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .18s;pointer-events:none}
	.ci-card:last-child{margin-bottom:0}
	.ci-card:hover{border-color:#222228}
	.ci-card:hover::before{background:rgba(255,255,255,.016)}
	.ci-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
	.ci-name{font-size:.92rem;font-weight:700;color:#d8d8e0;line-height:1.3;flex:1}
	.ci-total{font-size:.92rem;font-weight:800;color:#22c55e;white-space:nowrap}
	.ci-base-price{font-size:.76rem;color:#505060;margin-bottom:5px}
	.ci-addon-row{display:flex;align-items:center;gap:6px;font-size:.76rem;color:#505060;margin-bottom:3px;position:relative}
	.ci-addon-dot{color:#22c55e;font-weight:700;font-size:.82rem;line-height:1;flex-shrink:0}
	.ci-addon-name{flex:1;color:#707080}
	.ci-addon-price{color:#505060;white-space:nowrap}
	.ci-obs{font-size:.73rem;color:#505060;font-style:italic;margin-top:6px;padding:5px 8px;background:rgba(255,255,255,.025);border-radius:8px;border-left:2px solid rgba(34,197,94,.22)}
	.ci-actions{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.04);position:relative}
	.ci-qty-row{display:flex;align-items:center;background:#121216;border:1px solid #161619;border-radius:10px;overflow:hidden}
	.ci-qty-btn{width:32px;height:32px;border:none;background:transparent;color:#d8d8e0;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
	.ci-qty-btn:active{background:rgba(34,197,94,.14)}
	.ci-qty-val{min-width:26px;text-align:center;font-size:.86rem;font-weight:700;color:#d8d8e0}
	.ci-remove{border:none;background:transparent;color:#505060;font-size:.73rem;cursor:pointer;padding:4px 8px;border-radius:8px;transition:color .15s,background .15s}
	.ci-remove:hover{color:#f87171;background:rgba(248,113,113,.07)}
	.cart-footer{padding:12px 16px 20px;background:rgba(14,14,17,.92);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.04)}
	.cart-totals{margin-bottom:12px}
	.ct-row{display:flex;justify-content:space-between;font-size:.82rem;color:#505060;padding:3px 0}
	.ct-final{font-size:1rem!important;font-weight:800;color:#d8d8e0!important;border-top:1px solid rgba(255,255,255,.05);margin-top:6px;padding-top:8px}
	.ct-final>span:last-child{color:#22c55e!important}
	.cart-footer .btn-accent{background:linear-gradient(180deg,#2edb6b 0%,#1ab553 100%)!important;color:#041a0c!important;font-weight:800!important;transform:translateY(-2px);box-shadow:0 5px 0 #0c7a32,0 8px 24px rgba(34,197,94,.38),inset 0 1px 0 rgba(255,255,255,.22)!important;border:none!important;border-radius:14px!important;height:52px!important;font-size:.96rem!important;letter-spacing:-.01em}
	.cart-footer .btn-accent:active{transform:translateY(1px)!important;box-shadow:0 2px 0 #0c7a32,0 4px 12px rgba(34,197,94,.28),inset 0 1px 0 rgba(255,255,255,.12)!important}
	</style>

<script>
const FC={apiKey:"AIzaSyAnIJRcUxN-0swpVnonPbJjTSK87o4CQ_g",authDomain:"pedrad-814d0.firebaseapp.com",projectId:"pedrad-814d0",storageBucket:"pedrad-814d0.appspot.com",messagingSenderId:"293587190550",appId:"1:293587190550:web:80c9399f82847c80e20637"};
if(!firebase.apps.length)firebase.initializeApp(FC);
const db=firebase.firestore(),auth=firebase.auth();

const params=new URLSearchParams(location.search);
const storeId=params.get('id');
const initialProductId=params.get('productId');

let store=null, products=[], categories=[], cart=[], selectedCat='all';
const PRODUCT_CHUNK_SIZE=24;
let productsLazyObserver=null;

function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function money(v){return(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
function goInfo(){if(storeId)navigateTo('store-info.html?id='+storeId)}
function tsDate(v){return v?.toDate?.()||new Date(v||0)}
function isPromoActive(p){
    if(p.promo!==true&&p.promotional!==true&&p.onSale!==true)return false;
    if(p.promotionStatus==='inactive')return false;
    const now=Date.now(),start=tsDate(p.promotionStartsAt).getTime()||0,end=tsDate(p.promotionEndsAt).getTime()||0;
    return (!start||start<=now)&&(!end||end>=now);
}
function productPrice(p){
    const promo=Number(p.promoPrice||p.discountPrice||p.salePrice||0);
    const price=Number(p.price||0);
    return isPromoActive(p)&&promo>0&&promo<price?promo:price;
}
function priceHtml(p,cls){
    const current=productPrice(p),old=Number(p.oldPrice||p.price||0);
    const oldHtml=isPromoActive(p)&&old>current?` <span style="color:var(--text-3);text-decoration:line-through;font-size:.78em">${money(old)}</span>`:'';
    return `<div class="${cls}">${money(current)}${oldHtml}</div>`;
}

// ══════════ HOURS / OPEN STATUS ══════════
const DAY_KEYS=['sun','mon','tue','wed','thu','fri','sat'];

function parseHM(s){const[h,m]=String(s||'00:00').split(':').map(Number);return(h||0)*60+(m||0)}

function legacyHoursToNew(s){
    if(!s) return null;
    const wO=s.weekdayOpen, wC=s.weekdayClose, eO=s.weekendOpen, eC=s.weekendClose;
    if(!wO && !eO) return null;
    const wOpen=wO||'11:00', wClose=wC||'22:00';
    const eOpen=eO||'11:00', eClose=eC||'23:00';
    return {
        mon:{enabled:true,open:wOpen,close:wClose}, tue:{enabled:true,open:wOpen,close:wClose},
        wed:{enabled:true,open:wOpen,close:wClose}, thu:{enabled:true,open:wOpen,close:wClose},
        fri:{enabled:true,open:wOpen,close:wClose},
        sat:{enabled:true,open:eOpen,close:eClose}, sun:{enabled:true,open:eOpen,close:eClose},
        holidays:{enabled:false,open:'11:00',close:'22:00'}
    };
}

function isStoreOpen(s){
    if(s?.manuallyClosed===true) return false;
    const hours = s?.settings?.hours || legacyHoursToNew(s?.settings);
    if(!hours) return s?.open !== false;
    const now = new Date();
    const day = hours[DAY_KEYS[now.getDay()]];
    if(!day || day.enabled===false) return false;
    const cur = now.getHours()*60 + now.getMinutes();
    const open = parseHM(day.open), close = parseHM(day.close);
    if(open===close) return false;
    return close>open ? (cur>=open&&cur<close) : (cur>=open||cur<close);
}

// ══════════ LOAD STORE ══════════
async function loadStore(){
    const doc=await db.collection('stores').doc(storeId).get();
    if(!doc.exists){document.getElementById('storeContent').innerHTML='<div class="loading-state">Loja não encontrada</div>';return false}
    store={id:doc.id,...doc.data()};
    document.getElementById('hdrTitle').textContent=store.name||'Loja';
    const cfg=store.layoutConfig||{};
    if(cfg.accentColor)document.documentElement.style.setProperty('--store-accent',cfg.accentColor);
    return true;
}

async function loadProducts(){
    const snap=await db.collection('products').where('storeId','==',storeId).get();
    products=snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.active!==false);
    products.sort((a,b)=>(a.name||'').localeCompare(b.name||'','pt-BR'));
    categories=[...new Set(products.map(p=>p.category).filter(Boolean))].sort();
}

// ══════════ RENDER STORE ══════════
function renderStore(){
    const cfg=store.layoutConfig||{};
    let elements=normalizeLayoutElements(cfg.elements||['icon','info','categories','products']);
    if(!elements.includes('products')&&!elements.includes('grid')&&!elements.includes('list')){
        elements.push('products');
    }
    const container=document.getElementById('storeContent');

    let html='';
    elements.forEach(elId=>{ html+=renderElement(elId); });
    container.innerHTML=html;

    const search=document.getElementById('storeSearch');
    if(search)search.addEventListener('input',()=>renderProductSection());
}

function normalizeLayoutElements(elements){
    const list=Array.isArray(elements)?[...elements]:['icon','info','categories','products'];
    const noBanner=list.filter(id=>id!=='banner');
    if(!noBanner.includes('icon'))noBanner.unshift('icon');
    const hasIcon=noBanner.includes('icon');
    if(!hasIcon)noBanner.unshift('icon');
    return noBanner;
}

function refreshStoreView(){
    const searchValue=document.getElementById('storeSearch')?.value||'';
    renderStore();
    const search=document.getElementById('storeSearch');
    if(search)search.value=searchValue;
    renderProductSection();
}

function renderElement(elId){
    switch(elId){
        case 'banner': return '';
        case 'icon': return renderIcon();
        case 'info': return renderInfo();
        case 'search': return renderSearch();
        case 'categories': return renderCategories();
        case 'featured': return renderFeatured();
        case 'products': return renderProducts();
        case 'grid': return renderProducts('grid');
        case 'list': return renderProducts('list');
        case 'promos': return renderPromos();
        default: return '';
    }
}

function renderIcon(){
    const cfg=store.layoutConfig||{};
    if(cfg.mediaMode==='banner') return renderBanner();
    return renderStandaloneIcon(cfg.iconPos||'c');
}

function renderStandaloneIcon(rawPos){
    const img=store.imageUrl||'';
    const letter=esc((store.name||'L')[0]);
    const pos=rawPos==='l'?'flex-start':rawPos==='r'?'flex-end':'center';
    const iconHtml=img
        ?`<img src="${esc(img)}" alt="" class="el-icon-img">`
        :`<div class="el-icon-img el-icon-placeholder">${letter}</div>`;
    return`<div class="el-icon-row" style="justify-content:${pos}">${iconHtml}</div>`;
}

function renderBanner(){
    const cfg=store.layoutConfig||{};
    const bPos=cfg.bannerPos||'bl';
    const bannerSrc=store.bannerUrl||store.coverUrl||store.bannerImageUrl||'';
    const logoSrc=store.imageUrl||'';
    const name=esc(store.name||'');
    const meta=[
        store.deliveryTime?esc(store.deliveryTime):'',
        store.rating?`★ ${store.rating.toFixed(1)}`:''
    ].filter(Boolean).join(' · ');

    const fit=cfg.bannerFit||'cover';
    const bgEl=bannerSrc?`<img src="${esc(bannerSrc)}" alt="" class="bn-bg-img" style="object-fit:${fit}">`:'';
    const logoContent=logoSrc
        ?`<img src="${esc(logoSrc)}" alt="">`
        :`<span class="bn-logo-letter">${name[0]||'L'}</span>`;

    if(bPos==='below'){
        return`<div class="bn bn-below"><div class="bn-bg">${bgEl}</div><div class="bn-gradient"></div></div>${renderStandaloneIcon(cfg.iconPos||'c')}`;
    }

    let logoCls='bn-logo-left',copyCls='bn-copy-left',showCopy=true;
    if(bPos==='bc'){logoCls='bn-logo-center';showCopy=false}
    else if(bPos==='br'){logoCls='bn-logo-right';copyCls='bn-copy-right'}

    const copy=showCopy?`<div class="bn-copy ${copyCls}"><div class="bn-title">${name}</div>${meta?`<div class="bn-sub">${meta}</div>`:''}</div>`:'';
    return`<div class="bn"><div class="bn-bg">${bgEl}</div><div class="bn-gradient"></div><div class="bn-logo ${logoCls}">${logoContent}</div>${copy}</div>`;
}

function renderInfo(){
    const open=isStoreOpen(store);
    return`<div class="el-info">
        <div class="el-info-name">${esc(store.name)}</div>
        ${store.description?`<div class="el-info-desc">${esc(store.description)}</div>`:''}
        <div class="el-info-meta">
            ${store.rating?`<span>★ ${store.rating.toFixed(1)}</span>`:''}
            ${store.deliveryTime?`<span>${esc(store.deliveryTime)}</span>`:''}
        </div>
        ${!open?`<div class="el-info-closed">Fechado no momento</div>`:''}
    </div>`;
}

function renderSearch(){
    return`<div class="el-search"><input type="text" id="storeSearch" placeholder="Buscar no cardápio..." oninput="renderProductSection()"></div>`;
}

function renderCategories(){
    const cfg=store.layoutConfig||{};
    const mode=(cfg.catMode==='directory'?'dir':cfg.catMode)||'scroll';
    if(mode==='none')return'';

    const allActive=selectedCat==='all'?'active':'';

    if(mode==='cards'){
        const all=`<div class="el-cat-card ${allActive}" onclick="filterCat('all')">Todas</div>`;
        const rest=categories.map(c=>`<div class="el-cat-card ${selectedCat===c?'active':''}" onclick="filterCat('${esc(c)}')">${esc(c)}</div>`).join('');
        return`<div class="el-cats-cards" id="catsBar">${all}${rest}</div>`;
    }
    if(mode==='dir'){
        const all=`<div class="el-dir-item ${allActive}" onclick="filterCat('all')"><span>Todas</span><span class="el-dir-arrow">›</span></div>`;
        const rest=categories.map(c=>`<div class="el-dir-item ${selectedCat===c?'active':''}" onclick="filterCat('${esc(c)}')"><span>${esc(c)}</span><span class="el-dir-arrow">›</span></div>`).join('');
        return`<div class="el-dir" id="catsBar">${all}${rest}</div>`;
    }

    // scroll (default) — infinite marquee sliding left
    const all=`<button class="el-cat ${allActive}" onclick="filterCat('all')">Todas</button>`;
    const rest=categories.map(c=>`<button class="el-cat ${selectedCat===c?'active':''}" onclick="filterCat('${esc(c)}')">${esc(c)}</button>`).join('');
    const sequence=all+rest;
    return`<div class="el-cats-marquee" id="catsBar"><div class="el-cats-track">${sequence}${sequence}</div></div>`;
}

function filterCat(c){
    selectedCat=c;
    const bar=document.getElementById('catsBar');
    if(bar)bar.outerHTML=renderCategories();
    renderProductSection();
}

function renderFeatured(){
    const feat=products.filter(p=>p.featured||p.highlight).slice(0,6);
    if(!feat.length)return'';
    return`<div class="el-featured">${feat.map(p=>{
        const img=p.imageData||p.imageUrl||'';
        return`<div class="el-feat-card" onclick="openProduct('${p.id}')">
            <div class="el-feat-img">${img?`<img src="${esc(img)}" alt="">`:'<span>—</span>'}</div>
            <div class="el-feat-body"><div class="el-feat-name">${esc(p.name)}</div>${priceHtml(p,'el-feat-price')}</div>
        </div>`;
    }).join('')}</div>`;
}

function renderProducts(mode){
    const cfg=store.layoutConfig||{};
    const m=cfg.productMode||mode||'list';
    return`<div id="productSection" data-mode="${m}"></div>`;
}

function disconnectProductsLazyObserver(){
    if(productsLazyObserver){
        productsLazyObserver.disconnect();
        productsLazyObserver=null;
    }
}

function renderProductSection(keepVisibleCount=false){
    const section=document.getElementById('productSection');
    if(!section)return;
    const mode=section.dataset.mode||'list';
    const q=(document.getElementById('storeSearch')?.value||'').toLowerCase().trim();
    let list=[...products];
    if(selectedCat!=='all')list=list.filter(p=>(p.category||'')===selectedCat);
    if(q)list=list.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q));

    disconnectProductsLazyObserver();
    if(!list.length){
        section.innerHTML='<div class="products-empty">Nenhum produto encontrado</div>';
        section.dataset.visibleCount='0';
        return;
    }

    const currentVisible=Number(section.dataset.visibleCount||0);
    const targetVisible=keepVisibleCount
        ? Math.max(PRODUCT_CHUNK_SIZE,currentVisible||PRODUCT_CHUNK_SIZE)
        : PRODUCT_CHUNK_SIZE;
    const visible=Math.min(targetVisible,list.length);
    const visibleList=list.slice(0,visible);

    if(mode==='mini'){
        section.innerHTML=`<div class="el-mini-grid">${visibleList.map(p=>renderMiniCard(p)).join('')}</div>`;
    }else if(mode==='grid'){
        section.innerHTML=`<div class="el-grid">${visibleList.map(p=>renderGridCard(p)).join('')}</div>`;
    }else{
        const groups={};
        visibleList.forEach(p=>{const c=p.category||'Outros';if(!groups[c])groups[c]=[];groups[c].push(p)});
        let html='';
        for(const[cat,items]of Object.entries(groups)){
            html+=`<div class="el-list-group"><div class="el-list-cat">${esc(cat)}</div>${items.map(p=>renderListCard(p)).join('')}</div>`;
        }
        section.innerHTML=html;
    }
    section.dataset.visibleCount=String(visible);

    if(visible<list.length){
        section.insertAdjacentHTML('beforeend','<div id="productsLazySentinel" style="height:1px"></div><div class="products-empty" style="padding-top:8px">Carregando mais produtos...</div>');
        const sentinel=document.getElementById('productsLazySentinel');
        productsLazyObserver=new IntersectionObserver((entries)=>{
            const hit=entries.some(e=>e.isIntersecting);
            if(!hit)return;
            disconnectProductsLazyObserver();
            section.dataset.visibleCount=String(Math.min(visible+PRODUCT_CHUNK_SIZE,list.length));
            renderProductSection(true);
        },{root:null,rootMargin:'220px 0px'});
        if(sentinel)productsLazyObserver.observe(sentinel);
    }
}

function renderGridCard(p){
    const img=p.imageData||p.imageUrl||'';
    const inCart=cart.find(c=>c.id===p.id);
    return`<div class="el-grid-card" onclick="openProduct('${p.id}')">
        <div class="el-grid-img">${img?`<img src="${esc(img)}" alt="">`:'<span>—</span>'}</div>
        <div class="el-grid-body">
            <div class="el-grid-name">${esc(p.name)}</div>
            ${priceHtml(p,'el-grid-price')}
        </div>
        ${inCart?`<div class="el-grid-qty">${inCart.qty}</div>`:''}
    </div>`;
}

function renderMiniCard(p){
    return`<div class="el-mini-card" onclick="quickAdd('${p.id}')">
        <div class="el-mini-name">${esc(p.name)}</div>
        ${priceHtml(p,'el-mini-price')}
    </div>`;
}

function quickAdd(productId){
    const p=products.find(x=>x.id===productId);if(!p)return;
    const existing=cart.find(c=>c.id===p.id&&!c.addons.length);
    if(existing){existing.qty++}
    else{cart.push({id:p.id,name:p.name,price:productPrice(p),qty:1,addons:[],observation:'',productId:p.id,category:p.category||'',storeId:store.id,storeName:store.name||''})}
    updateCartBadge();renderProductSection(true);toast(p.name+' adicionado');
}

function renderListCard(p){
    const img=p.imageData||p.imageUrl||'';
    const inCart=cart.find(c=>c.id===p.id);
    return`<div class="el-list-card" onclick="openProduct('${p.id}')">
        <div class="el-list-img">${img?`<img src="${esc(img)}" alt="">`:'<span>—</span>'}</div>
        <div class="el-list-info">
            <div class="el-list-name">${esc(p.name)}</div>
            ${p.description?`<div class="el-list-desc">${esc(p.description.length>60?p.description.slice(0,58)+'…':p.description)}</div>`:''}
            ${priceHtml(p,'el-list-price')}
        </div>
        ${inCart?`<div class="el-list-qty">${inCart.qty}</div>`:''}
    </div>`;
}

function renderPromos(){
    return`<div class="el-promos"><div class="el-promo-card">Promoções em breve</div></div>`;
}

// ══════════ PRODUCT MODAL ══════════
function openProduct(productId){
    const p=products.find(x=>x.id===productId);
    if(!p)return;
    pmQtyVal=1;
    const img=p.imageData||p.imageUrl||'';
    const groups=p.addonGroups||[];
    const inCart=cart.find(c=>c.id===p.id);

    let addonsHtml='';
    if(groups.length){
        addonsHtml=groups.map((g,gi)=>{
            const req=g.min>0?` (obrigatório, mín ${g.min})`:'';
            const maxLabel=g.max>0?`, máx ${g.max}`:'';
            return`<div class="pm-group" data-group-index="${gi}" data-group-max="${g.max||0}" data-group-min="${g.min||0}">
                <div class="pm-group-title">${esc(g.name)}${req}${maxLabel}</div>
                ${(g.items||[]).map((it,ii)=>`<label class="pm-addon">
                    <input type="${(g.max||0)===1?'radio':'checkbox'}" name="pm-group-${gi}" data-gi="${gi}" data-ii="${ii}" data-price="${it.price||0}" data-name="${esc(it.name)}">
                    <span class="pm-addon-name">${esc(it.name)}</span>
                    <span class="pm-addon-price">${it.price>0?'+'+money(it.price):(g.type==='free'?'Grátis':'')}</span>
                </label>`).join('')}
            </div>`;
        }).join('');
    }

    document.getElementById('productDetail').innerHTML=`
        ${img?`<div class="pm-img"><img src="${esc(img)}" alt=""></div>`:''}
        <div class="pm-body">
            <div class="pm-name">${esc(p.name)}</div>
            ${p.description?`<div class="pm-desc">${esc(p.description)}</div>`:''}
            <div class="pm-price" data-base="${productPrice(p)}">${money(productPrice(p))}${isPromoActive(p)&&Number(p.oldPrice||p.price)>productPrice(p)?` <span style="color:var(--text-3);text-decoration:line-through;font-size:.78em">${money(p.oldPrice||p.price)}</span>`:''}</div>
            ${addonsHtml}
            <div class="pm-obs-group">
                <label class="pm-obs-label">Observação</label>
                <textarea class="pm-obs" id="pmObs" placeholder="Ex: sem cebola, bem passado..." rows="2"></textarea>
            </div>
            <div class="pm-qty-row">
                <div class="pm-qty">
                    <button onclick="pmQty(-1)">−</button>
                    <span id="pmQtyVal">${inCart?inCart.qty:1}</span>
                    <button onclick="pmQty(1)">+</button>
                </div>
                <button class="btn btn-accent" onclick="addFromModal('${p.id}')" id="pmAddBtn">Adicionar ${money(productPrice(p))}</button>
            </div>
        </div>`;
    document.body.classList.add('modal-open');
    document.getElementById('productModal').classList.add('active');
    updatePmTotal(productPrice(p));
    syncAddonGroupLimits();
}

function closeProductModal(){
    document.getElementById('productModal').classList.remove('active');
    document.body.classList.remove('modal-open');
}

let pmQtyVal=1;
function pmQty(d){
    pmQtyVal=Math.max(1,(parseInt(document.getElementById('pmQtyVal').textContent)||1)+d);
    document.getElementById('pmQtyVal').textContent=pmQtyVal;
    const checks=document.querySelectorAll('#productDetail input[type=checkbox]:checked, #productDetail input[type=radio]:checked');
    let extra=0;checks.forEach(c=>extra+=parseFloat(c.dataset.price)||0);
    const base=parseFloat(document.querySelector('.pm-price')?.dataset.base)||0;
    updatePmTotal(base+extra);
}

function updatePmTotal(unitPrice){
    const qty=parseInt(document.getElementById('pmQtyVal')?.textContent)||1;
    const btn=document.getElementById('pmAddBtn');
    if(btn)btn.textContent=`Adicionar ${money(unitPrice*qty)}`;
}

document.addEventListener('change',e=>{
    if(e.target.closest('#productDetail')&&(e.target.type==='checkbox'||e.target.type==='radio')){
        syncAddonGroupLimits();
        const base=parseFloat(document.querySelector('.pm-price')?.dataset.base)||0;
        const checks=document.querySelectorAll('#productDetail input[type=checkbox]:checked, #productDetail input[type=radio]:checked');
        let extra=0;checks.forEach(c=>extra+=parseFloat(c.dataset.price)||0);
        updatePmTotal(base+extra);
    }
});

function syncAddonGroupLimits(){
    document.querySelectorAll('.pm-group').forEach(groupEl=>{
        const max=parseInt(groupEl.dataset.groupMax)||0;
        const min=parseInt(groupEl.dataset.groupMin)||0;
        const boxes=[...groupEl.querySelectorAll('input[type=checkbox]')];
        const radios=[...groupEl.querySelectorAll('input[type=radio]')];
        const checked=[...boxes, ...radios].filter(b=>b.checked);
        const effectiveChecked=checked;
        const limitReached=max>0 && effectiveChecked.length>=max;

        boxes.forEach(box=>{
            if(box.checked){
                box.disabled=false;
                return;
            }
            box.disabled=limitReached;
        });

        if(min>0 && effectiveChecked.length<min){
            groupEl.dataset.groupValid='0';
        }else{
            groupEl.dataset.groupValid='1';
        }
    });
}

function addFromModal(productId){
    const p=products.find(x=>x.id===productId);if(!p)return;
    const qty=parseInt(document.getElementById('pmQtyVal')?.textContent)||1;
    const obs=(document.getElementById('pmObs')?.value||'').trim();
    const groupEls=document.querySelectorAll('.pm-group');
    for(const groupEl of groupEls){
        if(groupEl.dataset.groupValid==='0'){
            toast(`Escolha pelo menos ${groupEl.dataset.groupMin||1} opção(ões) em ${groupEl.querySelector('.pm-group-title')?.textContent || 'este grupo'}`);
            return;
        }
    }
    const checks=document.querySelectorAll('#productDetail input[type=checkbox]:checked, #productDetail input[type=radio]:checked');
    const addons=[];
    const grouped={};
    checks.forEach(c=>{
        const gi=c.dataset.gi||'0';
        if(!grouped[gi])grouped[gi]=[];
        grouped[gi].push({name:c.dataset.name,price:parseFloat(c.dataset.price)||0});
    });
    Object.keys(grouped).forEach(gi=>{
        const group=(p.addonGroups||[])[parseInt(gi)];
        const max=parseInt(group?.max)||0;
        const list=grouped[gi];
        const limited=max>0?list.slice(0,max):list;
        limited.forEach(a=>addons.push(a));
    });

    cart.push({id:p.id,name:p.name,price:productPrice(p),qty,addons,observation:obs,
        productId:p.id,category:p.category||'',storeId:store.id,storeName:store.name||''});
    closeProductModal();
    updateCartBadge();
    renderProductSection(true);
    toast('Adicionado ao pedido');
    pmQtyVal=1;
}

// ══════════ CART ══════════
function openCart(){document.getElementById('cartDrawer').classList.add('open');document.getElementById('cartOverlay').classList.add('open');renderCart()}
function closeCart(){document.getElementById('cartDrawer').classList.remove('open');document.getElementById('cartOverlay').classList.remove('open')}

function updateCartBadge(){
    const total=cart.reduce((s,c)=>s+c.qty,0);
    const badge=document.getElementById('cartBadge');
    badge.textContent=total;badge.style.display=total>0?'':'none';
}

function renderCart(){
    const body=document.getElementById('cartBody');
    const footer=document.getElementById('cartFooter');
    if(!cart.length){body.innerHTML='<div class="cart-empty">Adicione itens do cardápio</div>';footer.style.display='none';return}
    footer.style.display='block';

    body.innerHTML=cart.map((c,i)=>{
        const addonTotal=c.addons.reduce((s,a)=>s+(a.price||0),0);
        const itemTotal=(c.price+addonTotal)*c.qty;
        const addonsHtml=c.addons.length
            ?c.addons.map(a=>`<div class="ci-addon-row"><span class="ci-addon-dot">+</span><span class="ci-addon-name">${esc(a.name)}</span><span class="ci-addon-price">${money(a.price||0)}</span></div>`).join('')
            :'';
        const obsHtml=c.observation?`<div class="ci-obs">"${esc(c.observation)}"</div>`:'';
        return`<div class="ci-card">
            <div class="ci-top">
                <div class="ci-name">${esc(c.name)}</div>
                <div class="ci-total">${money(itemTotal)}</div>
            </div>
            <div class="ci-base-price">${money(c.price)} × ${c.qty}${c.addons.length?' + adicionais':''}</div>
            ${addonsHtml}
            ${obsHtml}
            <div class="ci-actions">
                <div class="ci-qty-row">
                    <button class="ci-qty-btn" onclick="changeQty(${i},-1)">−</button>
                    <span class="ci-qty-val">${c.qty}</span>
                    <button class="ci-qty-btn" onclick="changeQty(${i},+1)">+</button>
                </div>
                <button class="ci-remove" onclick="removeCartItem(${i})">Remover</button>
            </div>
        </div>`;
    }).join('');

    const subtotal=cart.reduce((s,c)=>{const at=c.addons.reduce((ss,a)=>ss+(a.price||0),0);return s+(c.price+at)*c.qty},0);
    document.getElementById('cartTotals').innerHTML=`
        <div class="ct-row"><span>Subtotal</span><span>${money(subtotal)}</span></div>
        <div class="ct-row ct-final"><span>Total</span><span>${money(subtotal)}</span></div>`;
}

function changeQty(i,delta){
    cart[i].qty=Math.max(1,cart[i].qty+delta);
    sessionStorage.setItem('pedrad_cart',JSON.stringify(cart));
    localStorage.setItem('pedrad_cart',JSON.stringify(cart));
    updateCartBadge();renderCart();
}

function removeCartItem(i){cart.splice(i,1);updateCartBadge();renderCart();renderProductSection(true)}

function goCheckout(){
    if(!cart.length){toast('Carrinho vazio');return}
    sessionStorage.setItem('pedrad_cart',JSON.stringify(cart));
    localStorage.setItem('pedrad_cart',JSON.stringify(cart));
    localStorage.setItem('checkoutStoreId',store.id);
    localStorage.setItem('cache_store_'+store.id,JSON.stringify({ts:Date.now(),data:{id:store.id,name:store.name,category:store.category||'',deliveryType:store.deliveryType||'app',phone:store.phone||'',address:store.address||''}}));
    sessionStorage.setItem('pedrad_store',JSON.stringify({id:store.id,name:store.name,category:store.category||'',deliveryType:store.deliveryType||'app',phone:store.phone||'',address:store.address||''}));
    navigateTo('checkout.html?storeId='+store.id);
}

// ══════════ INIT ══════════
auth.onAuthStateChanged(async (user)=>{
    if(!user){
        location.replace('index.html');
        return;
    }
    if(!storeId){document.getElementById('storeContent').innerHTML='<div class="loading-state">Loja não informada</div>';return}
    if(!await loadStore())return;
    await loadProducts();
    renderStore();
    renderProductSection();
    try{
        const saved=JSON.parse(sessionStorage.getItem('pedrad_cart')||localStorage.getItem('pedrad_cart')||'[]');
        const savedStore=JSON.parse(sessionStorage.getItem('pedrad_store')||'{}');
        if(savedStore.id===storeId&&saved.length)cart=saved;
    }catch(e){}
    updateCartBadge();
    if(initialProductId){
        setTimeout(()=>openProduct(initialProductId), 80);
    }

    setInterval(()=>{ if(store) refreshStoreView(); }, 60000);
});
</script>
