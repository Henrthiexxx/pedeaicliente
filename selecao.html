<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Selecao - Pedra Delivery</title>
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<script>(function(){var t=localStorage.getItem('pedrad-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="client.css">
<script src="pwa-register.js" defer></script>
<script src="page-transition.js" defer></script>
<style>
body{background:radial-gradient(ellipse 110% 32% at 50% 0%,#0d2018 0%,transparent 68%),radial-gradient(ellipse 80% 20% at 50% 100%,#090d0a 0%,transparent 60%),#080808}
.sel-hdr{position:sticky;top:0;z-index:20;height:64px;display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(8,8,8,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04)}
.sel-back{width:36px;height:36px;border:0;border-radius:50%;background:#111116;color:#d8d8e0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sel-title{font-size:.96rem;font-weight:700}
.sel-page{max-width:720px;margin:0 auto;padding:16px 14px 34px}
.insights{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.insight{background:#111116;border:1px solid #191920;border-radius:13px;padding:10px}
.insight-label{font-size:.64rem;color:#505060;text-transform:uppercase;letter-spacing:.08em;font-weight:800}
.insight-value{font-size:.88rem;color:#d8d8e0;font-weight:800;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.section{margin-top:18px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.section-title{font-size:.78rem;color:#8888a0;text-transform:uppercase;letter-spacing:.08em;font-weight:800}
.section-count{font-size:.7rem;color:#505060}
.cards{display:flex;flex-direction:column;gap:8px}
.rec-card{display:flex;gap:12px;align-items:center;padding:12px;background:#0e0e11;border:1px solid #161619;border-radius:15px;cursor:pointer;transition:border-color .18s,background .18s,transform .18s}
.rec-card:hover{border-color:#252530;background:#111116;transform:translateY(-1px)}
.rec-img{width:58px;height:58px;border-radius:16px;background:#19191e;border:1px solid #1e1e26;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#34343e;flex-shrink:0;font-weight:800}
.rec-img img{width:100%;height:100%;object-fit:cover}
.rec-body{flex:1;min-width:0}
.rec-name{font-size:.9rem;font-weight:800;color:#d8d8e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-meta{font-size:.72rem;color:#505060;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.chip{font-size:.62rem;color:#22c55e;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.18);border-radius:999px;padding:3px 7px;font-weight:800}
.chip.alt{color:#fbbf24;background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.18)}
.empty{padding:42px 18px;text-align:center;color:#505060;font-size:.84rem;line-height:1.45;border:1px dashed #191920;border-radius:16px;background:rgba(14,14,17,.45)}
.loading{padding:54px 18px;text-align:center;color:#505060;font-size:.84rem}
@media(max-width:420px){.insights{grid-template-columns:1fr}.rec-img{width:52px;height:52px}}
</style>
</head>
<body class="page-enter">
<header class="sel-hdr">
  <button class="sel-back" onclick="history.back()" aria-label="Voltar">&lt;</button>
  <div class="sel-title">Selecao para voce</div>
</header>
<main class="sel-page">
  <div id="content"><div class="loading">Montando sua selecao...</div></div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyAnIJRcUxN-0swpVnonPbJjTSK87o4CQ_g",authDomain:"pedrad-814d0.firebaseapp.com",projectId:"pedrad-814d0",storageBucket:"pedrad-814d0.appspot.com",messagingSenderId:"293587190550",appId:"1:293587190550:web:80c9399f82847c80e20637"};
if(!firebase.apps.length)firebase.initializeApp(FC);
const db=firebase.firestore();
const TRAIL_KEY='pedrad_recommendation_trail_v1';
let stores=[],products=[];

function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}
function readTrail(){try{return JSON.parse(localStorage.getItem(TRAIL_KEY)||'null')||null}catch{return null}}
function topBy(obj,field){return Object.entries(obj||{}).sort((a,b)=>(b[1]?.[field]||0)-(a[1]?.[field]||0))[0]||null}
function createdDate(v){return v?.toDate?.()||new Date(v||0)}
function isNewProduct(p){const d=createdDate(p.createdAt||p.updatedAt);return p.isNew===true||p.new===true||p.novidade===true||(Date.now()-d.getTime())<=21*24*60*60*1000}
function isPromoProduct(p){return p.promo===true||p.promotional===true||p.promotion===true||p.featured===true||p.highlight===true||p.onSale===true||Number(p.discount)>0||Number(p.discountPrice)>0||(Number(p.oldPrice)>0&&Number(p.oldPrice)>Number(p.price))}
function termsFromName(name){return norm(name).split(/\s+/).map(t=>t.replace(/[^a-z0-9]/g,'')).filter(t=>t.length>=4)}

async function loadData(){
  const [storeSnap,productSnap]=await Promise.all([
    db.collection('stores').get(),
    db.collection('products').get()
  ]);
  stores=storeSnap.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.active!==false&&!s.suspended);
  products=productSnap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.active!==false);
}

function productSignals(storeProducts,trail){
  const preferredProductCats=new Set(Object.keys(trail?.productCategories||{}).map(norm));
  const preferredTerms=trail?.terms||{};
  let promos=0,news=0,similar=0;
  const samples=[];

  storeProducts.forEach(p=>{
    const promo=isPromoProduct(p);
    const fresh=isNewProduct(p);
    const catMatch=preferredProductCats.has(norm(p.category));
    const termMatch=termsFromName(p.name).some(t=>(preferredTerms[t]||0)>0);
    if(promo)promos++;
    if(fresh)news++;
    if(catMatch||termMatch)similar++;
    if((promo||fresh||catMatch||termMatch)&&samples.length<3)samples.push(p.name);
  });

  return{promos,news,similar,samples};
}

function scoreStores(trail){
  const topOrders=topBy(trail?.storeCategories,'orders');
  const topSpent=topBy(trail?.storeCategories,'spent');
  const topOrdersCat=topOrders?.[0]||'';
  const topSpentCat=topSpent?.[0]||'';
  const productsByStore={};
  products.forEach(p=>{const sid=p.storeId||'';if(!sid)return;(productsByStore[sid]||(productsByStore[sid]=[])).push(p)});

  const hasTrail=!!trail?.ordersCount;
  return stores.map(store=>{
    const storeProducts=productsByStore[store.id]||[];
    const sig=productSignals(storeProducts,trail);
    let score=0;
    const reasons=[];

    if(hasTrail&&topOrdersCat&&norm(store.category)===norm(topOrdersCat)){score+=52;reasons.push('categoria favorita')}
    if(hasTrail&&topSpentCat&&norm(store.category)===norm(topSpentCat)){score+=46;reasons.push('Preferidos')}
    if(sig.promos){score+=Math.min(48,sig.promos*18);reasons.push(sig.promos+' promo')}
    if(sig.news){score+=Math.min(38,sig.news*14);reasons.push(sig.news+' novidade')}
    if(sig.similar){score+=Math.min(36,sig.similar*12)}
    if(hasTrail && score>0 && !trail?.stores?.[store.id]){reasons.push('Loja nova para voce')}
    if(!hasTrail){score+=sig.promos*18+sig.news*14+(store.featured?18:0)+(store.highlight?18:0)}

    return{store,score,reasons:[...new Set(reasons)],signals:sig};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
}

function renderSection(title,items){
  if(!items.length)return '';
  return `<section class="section">
    <div class="section-head"><div class="section-title">${esc(title)}</div><div class="section-count">${items.length}</div></div>
    <div class="cards">${items.map(renderCard).join('')}</div>
  </section>`;
}

function renderCard(item){
  const s=item.store;
  const img=s.imageUrl||s.bannerUrl||'';
  const sample=item.signals.samples.length?` · ${item.signals.samples.map(esc).join(', ')}`:'';
  const chips=item.reasons.slice(0,3).map((r,i)=>`<span class="chip ${i===1?'alt':''}">${esc(r)}</span>`).join('');
  return `<div class="rec-card" onclick="navigateTo('store.html?id=${esc(s.id)}')">
    <div class="rec-img">${img?`<img src="${esc(img)}" alt="">`:esc((s.name||'L')[0])}</div>
    <div class="rec-body">
      <div class="rec-name">${esc(s.name||'Loja')}</div>
      <div class="rec-meta">${esc(s.category||'')}${sample}</div>
      <div class="chips">${chips}</div>
    </div>
  </div>`;
}

function render(){
  const trail=readTrail();
  const scored=scoreStores(trail);
  const content=document.getElementById('content');

  if(!scored.length){
    content.innerHTML='<div class="empty">Ainda nao temos recomendacoes suficientes. Faca alguns pedidos ou volte quando houver lojas com promocoes e novidades.</div>';
    return;
  }

  const topOrdersCat=topBy(trail?.storeCategories,'orders')?.[0]||'';
  const topSpentCat=topBy(trail?.storeCategories,'spent')?.[0]||'';
  const byOrders=scored.filter(x=>topOrdersCat&&norm(x.store.category)===norm(topOrdersCat)).slice(0,6);
  const bySpent=scored.filter(x=>topSpentCat&&norm(x.store.category)===norm(topSpentCat)&&!byOrders.some(y=>y.store.id===x.store.id)).slice(0,6);
  const discovery=scored.filter(x=>!byOrders.some(y=>y.store.id===x.store.id)&&!bySpent.some(y=>y.store.id===x.store.id)).slice(0,8);

  content.innerHTML=[
    renderSection('Recomendações para voce!',byOrders.length?byOrders:scored.slice(0,6)),
    renderSection(topSpentCat?'Categorias onde voce mais gasta':'Lojas para descobrir',bySpent),
    renderSection('Parecidas com seu gosto',discovery)
  ].join('')||'<div class="empty">Nada encontrado por enquanto.</div>';
}

(async()=>{await loadData();render()})().catch(err=>{
  console.error(err);
  document.getElementById('content').innerHTML='<div class="empty">Nao foi possivel carregar sua selecao agora.</div>';
});
</script>
<script src="safe-area.js" defer></script>
<script src="swipe-back.js" defer></script>
</body>
</html>
