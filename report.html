<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Reportar problema - Pedra Delivery</title>
<script>(function(){var t=localStorage.getItem('pedrad-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="client.css">
<style>
body{margin:0;background:var(--bg-0);color:var(--text-0);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}.hdr{height:56px;background:var(--bg-1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px}.back{width:38px;height:38px;border:1px solid var(--border);border-radius:8px;background:var(--bg-2);color:var(--text-0)}.page{max-width:560px;margin:0 auto;padding:18px 16px}.card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:16px}.muted{color:var(--text-2);font-size:.86rem;line-height:1.5}.btn{display:inline-flex;margin-top:12px;padding:11px 14px;border-radius:8px;background:var(--accent);color:var(--accent-t);text-decoration:none;font-weight:700}
</style>
</head>
<body>
<header class="hdr"><button class="back" onclick="goBack()">‹</button><strong>Reportar problema</strong></header>
<main class="page">
  <section class="card">
    <h1>Reportar problema</h1>
    <p class="muted">Esta pagina foi criada para evitar link quebrado. Depois podemos ligar este fluxo ao Firestore, WhatsApp ou e-mail do suporte.</p>
    <a class="btn" href="support.html">Falar com suporte</a>
  </section>
</main>
<script>function goBack(){if(document.referrer&&document.referrer.includes(location.host))history.back();else location.href='help.html'}</script>
</body>
</html>
